<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crossy Road Clone</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      canvas {
        display: block;
        max-height: 100vh;
        aspect-ratio: 9 / 16;
      }
      #ui-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        font-family: 'Arial Black', Arial, sans-serif;
        z-index: 10;
      }
      #score-display {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 48px;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        display: none;
      }
      #high-score-display {
        position: absolute;
        top: 75px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 16px;
        color: #ccc;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        display: none;
      }
      #menu-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
      }
      #menu-screen h1 {
        font-size: 64px;
        color: #fff;
        text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
        margin-bottom: 10px;
      }
      #menu-screen .subtitle {
        font-size: 18px;
        color: #aaa;
        margin-bottom: 40px;
      }
      #menu-screen .start-btn {
        font-size: 24px;
        color: #fff;
        background: #4CAF50;
        border: none;
        padding: 15px 40px;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Arial Black', Arial, sans-serif;
        pointer-events: auto;
      }
      #menu-screen .start-btn:hover {
        background: #45a049;
      }
      #gameover-screen {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.5);
        pointer-events: auto;
      }
      #gameover-screen h2 {
        font-size: 48px;
        color: #ff4444;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        margin-bottom: 10px;
      }
      #gameover-score {
        font-size: 32px;
        color: #fff;
        margin-bottom: 5px;
      }
      #gameover-highscore {
        font-size: 18px;
        color: #ccc;
        margin-bottom: 30px;
      }
      #gameover-screen .retry-btn {
        font-size: 24px;
        color: #fff;
        background: #2196F3;
        border: none;
        padding: 15px 40px;
        border-radius: 8px;
        cursor: pointer;
        font-family: 'Arial Black', Arial, sans-serif;
      }
      #gameover-screen .retry-btn:hover {
        background: #1976D2;
      }
    </style>
  </head>
  <body>
    <div id="ui-overlay">
      <div id="score-display">0</div>
      <div id="high-score-display">HIGH SCORE: 0</div>
      <div id="menu-screen">
        <h1>CROSSY ROAD</h1>
        <p class="subtitle">Press SPACE or click to start</p>
        <button class="start-btn" id="start-btn">START</button>
      </div>
      <div id="gameover-screen">
        <h2>GAME OVER</h2>
        <div id="gameover-score">Score: 0</div>
        <div id="gameover-highscore">High Score: 0</div>
        <button class="retry-btn" id="retry-btn">RETRY</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
