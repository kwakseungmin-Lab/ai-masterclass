const player = {
  x: 100, y: GROUND_Y - 80, w: 52, h: 80,
  vx: 0, vy: 0,
  facing: 1,
  state: 'idle',
  lives: 3,
  weapon: 'pistol',
  ammo: Infinity,
  grenades: 10,
  invincible: 0,
  dead: false,
  deathTimer: 0,
  shootCooldown: 0,
  grenadeCooldown: 0,
  meleeCooldown: 0,
  onGround: false,
  crouching: false,
  animFrame: 0,
  animTimer: 0,
  coyoteTime: 0,
  jumpBuffer: 0,
  inTank: false,
  powRescued: 0,
  noDeath: true
};

function resetPlayer(full) {
  if (full) {
    player.lives = 3;
    player.powRescued = 0;
    player.noDeath = true;
    score = 0;
    extraLifeGiven = false;
  }
  player.x = camera.x + W * 0.3;
  player.y = 0;
  player.vy = 0;
  player.vx = 0;
  player.weapon = 'pistol';
  player.ammo = Infinity;
  player.grenades = 10;
  player.invincible = 120;
  player.dead = false;
  player.deathTimer = 0;
  player.crouching = false;
  player.state = 'idle';
  player.inTank = false;
}

function getFireRate() {
  if (player.weapon === 'hmg') return 4;
  if (player.weapon === 'rocket') return 20;
  if (player.weapon === 'shotgun') return 18;
  return 10;
}

function updatePlayer() {
  if (player.dead) {
    player.deathTimer++;
    player.vy += 0.3;
    player.y += player.vy;
    player.x -= player.facing * 2;
    if (player.deathTimer > 60) {
      player.lives--;
      if (player.lives < 0) {
        gameState = 'GAME_OVER';
        return;
      }
      player.noDeath = false;
      resetPlayer(false);
    }
    return;
  }

  if (player.invincible > 0) player.invincible--;

  let moveX = 0;
  if (!player.crouching) {
    if (keys['ArrowLeft']) { moveX = -3; player.facing = -1; }
    if (keys['ArrowRight']) { moveX = 3; player.facing = 1; }
  }
  player.x += moveX;

  if (keys['ArrowDown'] && player.onGround) {
    if (!player.crouching) {
      player.crouching = true;
      player.h = 48;
      player.y += 32;
    }
  } else if (player.crouching) {
    player.crouching = false;
    player.h = 80;
    player.y -= 32;
  }

  if (player.onGround) player.coyoteTime = 6;
  else player.coyoteTime = Math.max(0, player.coyoteTime - 1);

  if (justPressed['KeyX']) player.jumpBuffer = 6;
  else player.jumpBuffer = Math.max(0, player.jumpBuffer - 1);

  if (player.jumpBuffer > 0 && player.coyoteTime > 0) {
    player.vy = -10;
    player.onGround = false;
    player.jumpBuffer = 0;
    player.coyoteTime = 0;
    if (player.crouching) {
      player.crouching = false;
      player.h = 80;
      player.y -= 32;
    }
  }

  if (!keys['KeyX'] && player.vy < 0) {
    player.vy += 0.3;
  }

  player.vy += GRAVITY;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;
  player.y += player.vy;

  if (isNaN(player.x) || isNaN(player.y)) {
    player.x = camera.x + W * 0.3;
    player.y = GROUND_Y - player.h;
    player.vx = 0; player.vy = 0;
  }

  player.onGround = false;
  const groundLevel = GROUND_Y - player.h;
  if (player.y >= groundLevel) {
    player.y = groundLevel;
    if (player.vy > 4) addDust(player.x + player.w / 2, GROUND_Y);
    player.vy = 0;
    player.onGround = true;
  }

  for (const p of platforms) {
    if (player.x + player.w > p.x && player.x < p.x + p.w) {
      if (player.vy >= 0 && player.y + player.h > p.y && player.y + player.h < p.y + p.h + 10) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
      else if (player.y + player.h > p.y + 10 && player.y < p.y + p.h - 5) {
        if (moveX > 0 && player.x + player.w > p.x && player.x < p.x) {
          player.x = p.x - player.w;
        } else if (moveX < 0 && player.x < p.x + p.w && player.x + player.w > p.x + p.w) {
          player.x = p.x + p.w;
        }
      }
    }
  }

  player.x = Math.max(camera.x, Math.min(player.x, camera.x + W - player.w));

  if (player.shootCooldown > 0) player.shootCooldown--;
  if (keys['KeyZ'] && player.shootCooldown <= 0) {
    shoot();
    player.shootCooldown = getFireRate();
  }

  if (player.grenadeCooldown > 0) player.grenadeCooldown--;
  if (justPressed['KeyC'] && player.grenades > 0 && player.grenadeCooldown <= 0) {
    throwGrenade();
    player.grenades--;
    player.grenadeCooldown = 30;
  }

  if (player.meleeCooldown > 0) player.meleeCooldown--;
  if (justPressed['KeyV'] && player.meleeCooldown <= 0) {
    melee();
    player.meleeCooldown = 20;
  }

  player.animTimer++;
  if (player.animTimer > 8) {
    player.animTimer = 0;
    player.animFrame++;
  }

  if (player.dead) player.state = 'death';
  else if (player.crouching && keys['KeyZ']) player.state = 'crouch_shoot';
  else if (player.crouching) player.state = 'crouch';
  else if (!player.onGround) player.state = 'jump';
  else if (keys['KeyZ'] && player.shootCooldown > getFireRate() - 4) player.state = 'shoot';
  else if (moveX !== 0) player.state = 'walk';
  else player.state = 'idle';
}

// ===========================
// PROJECTILES
// ===========================
const playerBullets = [];
const enemyBullets = [];
const grenades = [];

function shoot() {
  playSound(player.weapon === 'hmg' ? 'machinegun' : player.weapon === 'rocket' ? 'explosion' : 'shoot');
  let dx = player.facing, dy = 0;
  if (keys['ArrowUp']) {
    if (keys['ArrowLeft'] || keys['ArrowRight']) { dy = -0.707; dx = player.facing * 0.707; }
    else { dy = -1; dx = 0; }
  }

  const bx = player.x + (player.facing > 0 ? player.w : 0);
  const by = player.y + (player.crouching ? 10 : 24);

  if (player.weapon === 'shotgun') {
    for (let i = -2; i <= 2; i++) {
      const angle = Math.atan2(dy, dx) + i * 0.175;
      playerBullets.push({
        x: bx, y: by, vx: Math.cos(angle) * 14, vy: Math.sin(angle) * 14,
        damage: 3, size: 4, life: 12, type: 'shotgun'
      });
    }
    if (player.ammo !== Infinity) { player.ammo--; if (player.ammo <= 0) { player.weapon = 'pistol'; player.ammo = Infinity; } }
  } else if (player.weapon === 'rocket') {
    playerBullets.push({
      x: bx, y: by, vx: dx * 8, vy: dy * 8,
      damage: 10, size: 16, life: 80, type: 'rocket', splash: 48
    });
    if (player.ammo !== Infinity) { player.ammo--; if (player.ammo <= 0) { player.weapon = 'pistol'; player.ammo = Infinity; } }
  } else {
    const speed = player.weapon === 'hmg' ? 12 : 10;
    const sz = player.weapon === 'hmg' ? 8 : 6;
    playerBullets.push({
      x: bx, y: by, vx: dx * speed, vy: dy * speed,
      damage: 1, size: sz, life: 60, type: player.weapon === 'hmg' ? 'hmg' : 'pistol'
    });
    if (player.weapon === 'hmg') {
      if (player.ammo !== Infinity) { player.ammo--; if (player.ammo <= 0) { player.weapon = 'pistol'; player.ammo = Infinity; } }
    }
  }

  addMuzzleFlash(bx, by, player.facing);
  addShellCasing(bx, by, player.facing);
}

function throwGrenade() {
  playSound('grenade');
  grenades.push({
    x: player.x + player.w / 2, y: player.y + 20,
    vx: player.facing * 6, vy: -8,
    damage: 20, splash: 64, owner: 'player', timer: 120
  });
}

function melee() {
  const meleeBox = {
    x: player.x + (player.facing > 0 ? player.w : -40),
    y: player.y + 10,
    w: 40, h: 60
  };
  for (const e of enemies) {
    if (!e.alive || e.state === 'death') continue;
    if (aabb(meleeBox, e)) {
      damageEnemy(e, 50, true);
    }
  }
  if (currentBoss && aabb(meleeBox, currentBoss)) {
    damageBoss(currentBoss, 50);
  }
}

function updateProjectiles() {
  for (let i = playerBullets.length - 1; i >= 0; i--) {
    const b = playerBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if (b.life <= 0 || b.x < camera.x - 50 || b.x > camera.x + W + 50 || b.y < -50 || b.y > H + 50) {
      if (b.type === 'rocket') { addExplosion(b.x, b.y, 'medium'); splashDamage(b.x, b.y, b.splash, b.damage); }
      playerBullets.splice(i, 1);
      continue;
    }
    for (const p of platforms) {
      if (p.type === 'barrier' && b.x > p.x && b.x < p.x + p.w && b.y > p.y && b.y < p.y + p.h) {
        if (b.type === 'rocket') { addExplosion(b.x, b.y, 'medium'); splashDamage(b.x, b.y, b.splash, b.damage); }
        playerBullets.splice(i, 1);
        break;
      }
    }
  }

  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx;
    b.y += b.vy;
    if (b.gravity) b.vy += b.gravity;
    b.life--;
    if (b.life <= 0 || b.x < camera.x - 50 || b.x > camera.x + W + 50 || b.y > H + 50) {
      if (b.type === 'rocket' || b.type === 'grenade') { addExplosion(b.x, b.y, 'small'); }
      enemyBullets.splice(i, 1);
      continue;
    }
    if (b.y >= GROUND_Y) {
      if (b.type === 'grenade' || b.type === 'rocket') {
        addExplosion(b.x, b.y, 'small');
        if (b.splash) splashDamagePlayer(b.x, b.y, b.splash);
      }
      enemyBullets.splice(i, 1);
      continue;
    }
    if (!player.dead && player.invincible <= 0) {
      if (b.x > player.x && b.x < player.x + player.w && b.y > player.y && b.y < player.y + player.h) {
        killPlayer();
        enemyBullets.splice(i, 1);
      }
    }
  }

  for (let i = grenades.length - 1; i >= 0; i--) {
    const g = grenades[i];
    g.x += g.vx;
    g.y += g.vy;
    g.vy += 0.4;
    g.timer--;
    if (g.y >= GROUND_Y || g.timer <= 0) {
      addExplosion(g.x, g.y, 'medium');
      if (g.owner === 'player') {
        splashDamage(g.x, g.y, g.splash, g.damage);
      } else {
        splashDamagePlayer(g.x, g.y, g.splash || 56);
      }
      grenades.splice(i, 1);
    }
  }
}

function splashDamage(x, y, radius, damage) {
  for (const e of enemies) {
    if (!e.alive || e.state === 'death') continue;
    const dx = (e.x + e.w/2) - x, dy = (e.y + e.h/2) - y;
    if (Math.sqrt(dx*dx + dy*dy) < radius) {
      damageEnemy(e, damage, false);
    }
  }
  for (const d of destructibles) {
    if (!d.alive) continue;
    const dx2 = (d.x + d.w/2) - x, dy2 = (d.y + d.h/2) - y;
    if (Math.sqrt(dx2*dx2 + dy2*dy2) < radius) {
      d.hp--;
      if (d.hp <= 0) destroyDestructible(d);
    }
  }
  if (currentBoss) {
    const dx3 = (currentBoss.x + currentBoss.w/2) - x, dy3 = (currentBoss.y + currentBoss.h/2) - y;
    if (Math.sqrt(dx3*dx3 + dy3*dy3) < radius) {
      damageBoss(currentBoss, damage);
    }
  }
}

function splashDamagePlayer(x, y, radius) {
  if (player.dead || player.invincible > 0) return;
  const dx = (player.x + player.w/2) - x, dy = (player.y + player.h/2) - y;
  if (Math.sqrt(dx*dx + dy*dy) < radius) {
    killPlayer();
  }
}

function killPlayer() {
  if (player.dead || player.invincible > 0) return;
  playSound('death');
  player.dead = true;
  player.deathTimer = 0;
  player.vy = -8;
  player.state = 'death';
}

function destroyDestructible(d) {
  d.alive = false;
  addExplosion(d.x + d.w/2, d.y + d.h/2, 'small');
  if (d.item) spawnItem(d.x, d.y - 10, d.item);
}

// ===========================
// COLLISION HELPER
// ===========================
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + (a.w || 0) > b.x && a.y < b.y + b.h && a.y + (a.h || 0) > b.y;
}

// ===========================
// ENEMIES
// ===========================
const enemies = [];
const spawnQueue = [];
let spawnIndex = 0;

function initEnemySpawns() {
  spawnQueue.length = 0;
  spawnIndex = 0;

  for (let i = 0; i < 3; i++) spawnQueue.push({ x: 500 + i*80, type: 'infantry' });
  spawnQueue.push({ x: 800, type: 'infantry' });
  spawnQueue.push({ x: 880, type: 'infantry' });
  spawnQueue.push({ x: 920, type: 'infantry' });
  spawnQueue.push({ x: 1000, type: 'infantry' });
  for (let i = 0; i < 3; i++) spawnQueue.push({ x: 1000 + i*80, type: 'parachute' });
  spawnQueue.push({ x: 1250, type: 'bazooka' });
  spawnQueue.push({ x: 1350, type: 'bazooka' });
  for (let i = 0; i < 4; i++) spawnQueue.push({ x: 1400 + i*50, type: 'infantry' });
  spawnQueue.push({ x: 1800, type: 'shield' });
  for (let i = 0; i < 3; i++) spawnQueue.push({ x: 1850 + i*50, type: 'infantry' });
  for (let i = 0; i < 4; i++) spawnQueue.push({ x: 2200 + i*80, type: 'parachute' });
  for (let i = 0; i < 4; i++) spawnQueue.push({ x: 2400 + i*100, type: 'infantry' });
  spawnQueue.push({ x: 2600, type: 'bazooka' });
  spawnQueue.push({ x: 2700, type: 'bazooka' });
  for (let i = 0; i < 5; i++) spawnQueue.push({ x: 3000 + i*80, type: 'infantry' });

  for (let i = 0; i < 4; i++) spawnQueue.push({ x: 4600 + i*50, type: 'infantry' });
  spawnQueue.push({ x: 5000, type: 'shield' });
  spawnQueue.push({ x: 5050, type: 'shield' });
  spawnQueue.push({ x: 5100, type: 'bazooka' });
  spawnQueue.push({ x: 5150, type: 'bazooka' });
  for (let i = 0; i < 3; i++) spawnQueue.push({ x: 5400 + i*80, type: 'parachute' });
  for (let i = 0; i < 3; i++) spawnQueue.push({ x: 5450 + i*60, type: 'infantry' });
  for (let i = 0; i < 4; i++) spawnQueue.push({ x: 5800 + i*50, type: 'infantry' });
  for (let i = 0; i < 2; i++) spawnQueue.push({ x: 5850 + i*80, type: 'infantry' });
  for (let i = 0; i < 3; i++) spawnQueue.push({ x: 6200 + i*60, type: 'bazooka' });
  for (let i = 0; i < 3; i++) spawnQueue.push({ x: 6400 + i*60, type: 'shield' });
  for (let i = 0; i < 6; i++) spawnQueue.push({ x: 6800 + i*70, type: ['infantry','knife','bazooka','shield','infantry','knife'][i] });
}

function spawnEnemies() {
  while (spawnIndex < spawnQueue.length && enemies.length < 12) {
    const s = spawnQueue[spawnIndex];
    if (s.x < camera.x + W + 100) {
      const ex = Math.max(s.x, camera.x + W - 50);
      if (Math.abs(ex - player.x) < 200 && s.type !== 'parachute') {
        const safeX = Math.max(ex, player.x + 200);
        const e = createEnemy(s.type, safeX, s.type === 'parachute' ? -50 : GROUND_Y - 76);
        enemies.push(e);
      } else {
        const e = createEnemy(s.type, ex, s.type === 'parachute' ? -50 : GROUND_Y - 76);
        enemies.push(e);
      }
      spawnIndex++;
    } else break;
  }
}

function createEnemy(type, x, y) {
  return {
    type: type, x: x, y: y,
    w: type === 'shield' ? 52 : 48,
    h: type === 'shield' ? 80 : 76,
    hp: type === 'shield' ? 5 : 1,
    vx: 0, vy: 0,
    facing: -1,
    state: 'idle',
    alive: true,
    stateTimer: 30 + Math.random() * 60,
    shootTimer: 60 + Math.random() * 60,
    animFrame: 0,
    animTimer: 0,
    deathFrame: 0,
    hasShield: type === 'shield',
    parachute: type === 'parachute',
    score: type === 'bazooka' ? 300 : type === 'shield' ? 500 : type === 'parachute' ? 200 : 100,
    patrolDir: Math.random() < 0.5 ? 1 : -1,
    patrolTimer: 60 + Math.random() * 120,
    attackDelay: 45 + Math.random() * 30,
    duckTimer: 0
  };
}

function updateEnemies() {
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (e.state === 'death') {
      e.deathFrame++;
      e.vy += 0.3;
      e.y += e.vy;
      e.x += e.facing * -2;
      if (e.deathFrame > 40) { enemies.splice(i, 1); continue; }
      continue;
    }

    if (!e.alive) { enemies.splice(i, 1); continue; }

    if (e.x < camera.x - 200 || e.x > camera.x + W + 400) { enemies.splice(i, 1); continue; }

    if (e.parachute) {
      e.vy = 0.6;
      e.y += e.vy;
      if (e.y >= GROUND_Y - e.h) {
        e.y = GROUND_Y - e.h;
        e.parachute = false;
        e.vy = 0;
      }
      e.shootTimer--;
      if (e.shootTimer <= 0 && !player.dead) {
        enemyShoot(e);
        e.shootTimer = 60;
      }
      e.facing = player.x < e.x ? -1 : 1;
    }

    e.facing = player.x < e.x ? -1 : 1;
    const dist = Math.abs(player.x - e.x);

    if (!e.parachute) {

    e.animTimer++;
    if (e.animTimer > 10) { e.animTimer = 0; e.animFrame++; }

    e.stateTimer--;
    if (e.type === 'knife') {
      if (dist < 300) {
        e.vx = e.facing * 4;
        e.state = 'walk';
        if (dist < 36) {
          e.state = 'attack';
          if (e.stateTimer <= 0) {
            if (!player.dead && player.invincible <= 0 &&
                Math.abs(player.y + player.h - (e.y + e.h)) < 40) {
              killPlayer();
            }
            e.stateTimer = 30;
          }
        }
      } else {
        e.vx = e.facing * 2;
        e.state = 'walk';
      }
    } else if (e.type === 'bazooka') {
      if (dist > 350) { e.vx = e.facing * 1; e.state = 'walk'; }
      else if (dist < 200) { e.vx = -e.facing * 1; e.state = 'walk'; }
      else { e.vx = 0; e.state = 'idle'; }
      e.shootTimer--;
      if (e.shootTimer <= 0 && !player.dead) {
        enemyShootRocket(e);
        e.shootTimer = 120;
      }
    } else if (e.type === 'shield') {
      e.vx = e.facing * 1;
      e.state = 'walk';
      if (dist < 36) {
        e.state = 'attack';
        if (e.stateTimer <= 0) {
          if (!player.dead && player.invincible <= 0) killPlayer();
          e.stateTimer = 30;
        }
      }
    } else {
      if (e.attackDelay > 0) {
        e.attackDelay--;
        e.patrolTimer--;
        if (e.patrolTimer <= 0) {
          e.patrolDir *= -1;
          e.patrolTimer = 60 + Math.random() * 80;
        }
        e.vx = e.patrolDir * 1;
        e.state = 'walk';
      } else if (e.stateTimer <= 0) {
        if (dist < 320 && Math.random() < 0.8) {
          if (Math.random() < 0.15 && e.duckTimer <= 0) {
            e.state = 'crouch';
            e.vx = 0;
            e.duckTimer = 40;
            e.stateTimer = 40;
          } else if (Math.random() < 0.2) {
            enemyThrowGrenade(e);
            e.stateTimer = 90;
            e.state = 'shoot';
            e.vx = 0;
          } else {
            enemyShoot(e);
            e.stateTimer = 90;
            e.state = 'shoot';
            e.vx = 0;
          }
        } else {
          e.patrolTimer--;
          if (e.patrolTimer <= 0) {
            e.patrolDir *= -1;
            e.patrolTimer = 60 + Math.random() * 80;
          }
          if (dist > 400) {
            e.vx = e.facing * 1.5;
          } else {
            e.vx = e.patrolDir * 1;
          }
          e.stateTimer = 60 + Math.random() * 60;
          e.state = 'walk';
        }
      }
      if (e.duckTimer > 0) {
        e.duckTimer--;
        if (e.duckTimer <= 0) {
          e.state = 'idle';
        }
      }
    }

    e.x += e.vx;

    e.vy += GRAVITY;
    if (e.vy > MAX_FALL) e.vy = MAX_FALL;
    e.y += e.vy;
    if (e.y >= GROUND_Y - e.h) {
      e.y = GROUND_Y - e.h;
      e.vy = 0;
    }

    for (const p of platforms) {
      if (e.x + e.w > p.x && e.x < p.x + p.w && e.vy >= 0 &&
          e.y + e.h > p.y && e.y + e.h < p.y + p.h + 10) {
        e.y = p.y - e.h;
        e.vy = 0;
      }
    }

    }

    if (!player.dead && player.invincible <= 0 && e.type !== 'infantry' && e.type !== 'bazooka') {
      if (aabb(player, e)) {
        killPlayer();
      }
    }

    for (let j = playerBullets.length - 1; j >= 0; j--) {
      const b = playerBullets[j];
      if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
        if (e.hasShield && b.vx * e.facing > 0 && b.type !== 'rocket') {
          playerBullets.splice(j, 1);
          effects.push({ type: 'deflect', x: b.x, y: b.y, frame: 0, maxFrame: 6 });
          continue;
        }
        damageEnemy(e, b.damage, false);
        if (b.type === 'rocket') {
          addExplosion(b.x, b.y, 'medium');
          if (b.splash) splashDamage(b.x, b.y, b.splash, b.damage);
        }
        playerBullets.splice(j, 1);
        break;
      }
    }
  }
}

function damageEnemy(e, damage, isMelee) {
  e.hp -= damage;
  if (e.hp <= 0) {
    e.alive = false;
    e.state = 'death';
    e.deathFrame = 0;
    e.vy = -6;
    const pts = isMelee ? e.score * 2 : e.score;
    score += pts;
    addScorePopup(e.x, e.y, pts);
    hitStop = 3;
    if (Math.random() < (e.type === 'shield' ? 0.25 : 0.1)) {
      const items = ['food_can', 'food_apple', 'food_bread'];
      spawnItem(e.x, e.y, items[Math.floor(Math.random() * items.length)]);
    }
  } else {
    effects.push({ type: 'hit', x: e.x + e.w/2, y: e.y + e.h/2, frame: 0, maxFrame: 4 });
    if (e.hasShield && damage >= 10) {
      e.hasShield = false;
      e.hp = 1;
      e.w = 48;
    }
  }
}

function enemyShoot(e) {
  const bx = e.x + (e.facing > 0 ? e.w : 0);
  const by = e.y + 20;
  enemyBullets.push({
    x: bx, y: by, vx: e.facing * 5, vy: 0,
    life: 120, type: 'bullet'
  });
}

function enemyShootRocket(e) {
  const bx = e.x + (e.facing > 0 ? e.w : 0);
  const by = e.y + 15;
  const dx = player.x - e.x, dy = player.y - e.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 1;
  enemyBullets.push({
    x: bx, y: by, vx: (dx/dist) * 4, vy: (dy/dist) * 4,
    life: 180, type: 'rocket', splash: 32
  });
}

function enemyThrowGrenade(e) {
  enemyBullets.push({
    x: e.x + e.w/2, y: e.y + 10,
    vx: e.facing * 4, vy: -6,
    gravity: 0.3, life: 180, type: 'grenade', splash: 48
  });
}

// ===========================
// ITEMS
// ===========================
const items = [];

function spawnItem(x, y, type) {
  let safeX = x;
  for (const p of platforms) {
    if (safeX >= p.x - 16 && safeX <= p.x + p.w + 16 &&
        y >= p.y - 40 && y <= p.y + p.h) {
      const distLeft = Math.abs(safeX - (p.x - 20));
      const distRight = Math.abs(safeX - (p.x + p.w + 20));
      safeX = distLeft < distRight ? p.x - 20 : p.x + p.w + 20;
    }
  }
  items.push({ x: safeX, y: y, w: 32, h: 32, type: type, vy: -4, life: 780, onGround: false });
}

function updateItems() {
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.vy += 0.5;
    it.y += it.vy;
    if (it.y >= GROUND_Y - it.h) {
      it.y = GROUND_Y - it.h;
      it.vy = 0;
      it.onGround = true;
    }
    it.life--;
    if (it.life <= 0) { items.splice(i, 1); continue; }

    if (!player.dead && aabb(player, it)) {
      pickupItem(it);
      items.splice(i, 1);
    }
  }
}

function pickupItem(it) {
  if (it.type === 'H') {
    player.weapon = 'hmg';
    player.ammo = 200;
    weaponAnnounce = 'HEAVY MACHINE GUN!';
    weaponAnnounceTimer = 60;
  } else if (it.type === 'R') {
    player.weapon = 'rocket';
    player.ammo = 30;
    weaponAnnounce = 'ROCKET LAUNCHER!';
    weaponAnnounceTimer = 60;
  } else if (it.type === 'S') {
    player.weapon = 'shotgun';
    player.ammo = 30;
    weaponAnnounce = 'SHOTGUN!';
    weaponAnnounceTimer = 60;
  } else if (it.type === 'G') {
    player.grenades = Math.min(99, player.grenades + 10);
  } else if (it.type === 'food_can') {
    score += 1000;
    addScorePopup(it.x, it.y, 1000);
  } else if (it.type === 'food_apple') {
    score += 500;
    addScorePopup(it.x, it.y, 500);
  } else if (it.type === 'food_bread') {
    score += 300;
    addScorePopup(it.x, it.y, 300);
  }
}

const pows = [];

function initPOWs() {
  pows.length = 0;
  const positions = [500, 1100, 2000, 2800, 3300, 4800, 5600, 6400, 7000, 7050];
  const drops = ['H', 'R', 'S', 'G', 'food_can', 'G', 'food_can', 'H', 'R', 'food_can'];
  for (let i = 0; i < positions.length; i++) {
    pows.push({
      x: positions[i], y: GROUND_Y - 64,
      w: 40, h: 64,
      state: 'tied', rescued: false,
      runTimer: 0, dropItem: drops[i],
      animFrame: 0
    });
  }
}

function updatePOWs() {
  for (const p of pows) {
    if (p.rescued) {
      p.runTimer++;
      if (p.runTimer > 30) {
        p.x += 3;
        p.state = 'run';
      }
      continue;
    }
    const sx = p.x - camera.x;
    if (sx < -50 || sx > W + 50) continue;

    for (let j = playerBullets.length - 1; j >= 0; j--) {
      const b = playerBullets[j];
      if (b.x > p.x && b.x < p.x + p.w && b.y > p.y && b.y < p.y + p.h) {
        rescuePOW(p);
        playerBullets.splice(j, 1);
        break;
      }
    }
  }
}

function rescuePOW(p) {
  if (p.rescued) return;
  p.rescued = true;
  p.state = 'free';
  p.runTimer = 0;
  player.powRescued++;
  score += 10000;
  addScorePopup(p.x, p.y, 10000);
  if (p.dropItem) spawnItem(p.x, p.y - 10, p.dropItem);
}

let currentBoss = null;
let bossIntroTimer = 0;

function checkBossTrigger() {
  if (!currentBoss && camera.x + W * 0.5 >= 3400 && camera.x < 4000) {
    startBoss('allen');
  }
  if (!currentBoss && camera.x + W * 0.5 >= 7200) {
    startBoss('dicokka');
  }
}

function startBoss(type) {
  stopBGM();
  playBGM('boss');
  camera.locked = true;
  camera.lockX = camera.x;
  bossIntroTimer = 60;
  gameState = 'BOSS_INTRO';

  if (type === 'allen') {
    currentBoss = {
      type: 'allen', x: camera.x + W - 100, y: GROUND_Y - 112,
      w: 80, h: 112, hp: 100, maxHp: 100,
      facing: -1, state: 'idle', stateTimer: 30,
      attackCooldown: 0, burstCount: 0,
      phase: 1, flashTimer: 0, animFrame: 0,
      score: 50000, name: 'MECHA ROBOT'
    };
  } else {
    currentBoss = {
      type: 'dicokka', x: camera.x + W - 220, y: GROUND_Y - 128,
      w: 192, h: 128, hp: 200, maxHp: 200,
      facing: -1, state: 'idle', stateTimer: 60,
      attackCooldown: 0, burstCount: 0,
      phase: 1, flashTimer: 0, treadFrame: 0, animFrame: 0,
      soldierCooldown: 300,
      score: 100000, name: 'WARSHIP'
    };
  }
}

function updateBoss() {
  if (!currentBoss) return;
  const b = currentBoss;

  if (b.flashTimer > 0) b.flashTimer--;
  b.animFrame++;

  if (b.type === 'allen') updateAllen(b);
  else updateDiCokka(b);
}

function updateAllen(b) {
  b.facing = player.x < b.x ? -1 : 1;
  const dist = Math.abs(player.x - b.x);

  b.stateTimer--;
  if (b.attackCooldown > 0) b.attackCooldown--;

  if (b.state === 'idle' && b.attackCooldown <= 0) {
    if (dist < 100) {
      b.state = 'charge';
      b.stateTimer = 30;
    } else if (dist < 200) {
      b.state = 'grenade';
      b.burstCount = 3;
      b.stateTimer = 60;
    } else {
      b.state = 'shoot';
      b.burstCount = b.hp < b.maxHp * 0.4 ? 20 : 12;
      b.stateTimer = b.burstCount * 6;
    }
  }

  if (b.state === 'idle') {
    if (dist > 200) {
      b.x += b.facing * 1.5;
    }
    b.x = Math.max(camera.x + 20, Math.min(camera.x + W - b.w - 20, b.x));
  }

  if (b.state === 'shoot') {
    if (b.burstCount > 0 && b.stateTimer % 6 === 0) {
      const bx = b.x + (b.facing > 0 ? b.w + 10 : -10);
      const by = b.y + 40;
      enemyBullets.push({
        x: bx, y: by,
        vx: b.facing * 8, vy: (Math.random() - 0.5) * 2,
        life: 120, type: 'bullet'
      });
      b.burstCount--;
    }
    if (b.stateTimer <= 0 || b.burstCount <= 0) {
      b.state = 'idle';
      b.stateTimer = 30;
      b.attackCooldown = 40 + Math.random() * 40;
    }
  }

  if (b.state === 'grenade') {
    if (b.burstCount > 0 && b.stateTimer % 20 === 0) {
      enemyBullets.push({
        x: b.x + b.w/2, y: b.y + 10,
        vx: b.facing * 5, vy: -7,
        gravity: 0.35, life: 180, type: 'grenade', splash: 56
      });
      b.burstCount--;
      b.x += b.facing * 1;
    }
    if (b.stateTimer <= 0) {
      b.state = 'idle';
      b.stateTimer = 30;
      b.attackCooldown = 50 + Math.random() * 30;
    }
  }

  if (b.state === 'charge') {
    b.x += b.facing * 4;
    if (!player.dead && player.invincible <= 0 && aabb(player, b)) {
      killPlayer();
    }
    if (b.stateTimer <= 0) {
      grenades.push({
        x: b.x + b.w/2, y: b.y + 20,
        vx: b.facing * 5, vy: -7,
        damage: 10, splash: 60, owner: 'enemy', timer: 120
      });
      b.state = 'idle';
      b.stateTimer = 30;
      b.attackCooldown = 60 + Math.random() * 30;
    }
  }

  if (camera.locked) {
    b.x = Math.max(camera.lockX + 20, Math.min(b.x, camera.lockX + W - b.w - 20));
  }

  if (b.hp < b.maxHp * 0.5) {
    if (b.attackCooldown > 0) b.attackCooldown = Math.max(b.attackCooldown - 1, 0);
  }

  for (let j = playerBullets.length - 1; j >= 0; j--) {
    const pb = playerBullets[j];
    if (pb.x > b.x && pb.x < b.x + b.w && pb.y > b.y && pb.y < b.y + b.h) {
      damageBoss(b, pb.damage);
      if (pb.type === 'rocket') { addExplosion(pb.x, pb.y, 'medium'); if (pb.splash) splashDamage(pb.x, pb.y, pb.splash, pb.damage); }
      playerBullets.splice(j, 1);
    }
  }
}

function updateDiCokka(b) {
  b.facing = player.x < b.x ? -1 : 1;
  b.treadFrame = (b.treadFrame + 0.5) % 4;
  b.stateTimer--;
  if (b.attackCooldown > 0) b.attackCooldown--;
  if (b.soldierCooldown > 0) b.soldierCooldown--;

  const speed = b.phase === 2 ? 2 : 1.5;

  if (b.state === 'idle' && b.stateTimer <= 0) {
    b.state = 'advance';
    b.stateTimer = 120;
  }

  if (b.state === 'advance') {
    b.x += b.facing * speed;
    b.x = Math.max(camera.x + 20, Math.min(camera.x + W - b.w - 20, b.x));
    if (b.x <= camera.x + 20 || b.x >= camera.x + W - b.w - 20) b.facing *= -1;

    if (b.attackCooldown <= 0) {
      const roll = Math.random();
      if (roll < 0.4) {
        b.state = 'cannon';
        b.stateTimer = b.phase === 2 ? 90 : 30;
        b.burstCount = b.phase === 2 ? 3 : 1;
      } else if (roll < 0.7) {
        b.state = 'mg';
        b.burstCount = 20;
        b.stateTimer = 120;
      } else if (b.phase === 2 && b.hp < b.maxHp * 0.6 && roll < 0.85) {
        b.state = 'rush';
        b.stateTimer = 80;
      } else {
        b.state = 'advance';
        b.stateTimer = 60;
      }
      const cooldownMult = b.phase === 2 ? 0.7 : 1;
      b.attackCooldown = (90 + Math.random() * 60) * cooldownMult;
    }
  }

  if (b.state === 'cannon') {
    if (b.burstCount > 0 && b.stateTimer % 30 === 0) {
      const targetX = player.x + (b.burstCount === 3 ? -60 : b.burstCount === 1 ? 60 : 0);
      const dx = targetX - b.x, dy = GROUND_Y - b.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      const spd = b.phase === 2 ? 6 : 5;
      enemyBullets.push({
        x: b.x + (b.facing > 0 ? b.w : 0), y: b.y + 20,
        vx: (dx/dist) * spd, vy: -3,
        gravity: 0.15, life: 200, type: 'rocket', splash: 72
      });
      b.burstCount--;
      screenShake = 6;
    }
    if (b.stateTimer <= 0) {
      b.state = 'advance';
      b.stateTimer = 60;
    }
  }

  if (b.state === 'mg') {
    if (b.burstCount > 0 && b.stateTimer % 6 === 0) {
      const dx = player.x - b.x, dy = player.y - (b.y + 10);
      const dist = Math.sqrt(dx*dx + dy*dy) || 1;
      enemyBullets.push({
        x: b.x + b.w/2, y: b.y + 10,
        vx: (dx/dist) * 6 + (Math.random()-0.5)*1, vy: (dy/dist) * 6 + (Math.random()-0.5)*1,
        life: 120, type: 'bullet'
      });
      b.burstCount--;
    }
    if (b.stateTimer <= 0 || b.burstCount <= 0) {
      b.state = 'advance';
      b.stateTimer = 90;
    }
  }

  if (b.state === 'rush') {
    b.x += b.facing * 4;
    if (!player.dead && player.invincible <= 0 && aabb(player, b)) killPlayer();
    if (b.stateTimer <= 0) {
      b.state = 'idle';
      b.stateTimer = 90;
    }
  }

  if (b.soldierCooldown <= 0) {
    const count = b.phase === 2 ? 3 : 2;
    for (let i = 0; i < count; i++) {
      const eType = Math.random() < 0.3 ? 'knife' : 'infantry';
      const e = createEnemy(eType, b.x + b.w/2 - 24, b.y);
      e.vy = -4;
      enemies.push(e);
    }
    b.soldierCooldown = b.phase === 2 ? 200 : 300;
  }

  if (b.hp <= b.maxHp / 2 && b.phase === 1) {
    b.phase = 2;
    screenShake = 15;
    addExplosion(b.x + b.w/2, b.y + b.h/2, 'large');
  }

  for (let j = playerBullets.length - 1; j >= 0; j--) {
    const pb = playerBullets[j];
    if (pb.x > b.x && pb.x < b.x + b.w && pb.y > b.y && pb.y < b.y + b.h) {
      const turretHit = pb.y < b.y + 48 && pb.x > b.x + 60 && pb.x < b.x + 132;
      damageBoss(b, pb.damage * (turretHit ? 1.5 : 1));
      if (pb.type === 'rocket') { addExplosion(pb.x, pb.y, 'medium'); }
      playerBullets.splice(j, 1);
    }
  }
}

function damageBoss(b, damage) {
  b.hp -= damage;
  b.flashTimer = 3;
  hitStop = 2;
  effects.push({ type: 'hit', x: b.x + b.w/2 + (Math.random()-0.5)*30, y: b.y + b.h/2 + (Math.random()-0.5)*30, frame: 0, maxFrame: 4 });

  if (b.hp <= 0) {
    bossDefeated(b);
  }
}

function bossDefeated(b) {
  score += b.score;
  addScorePopup(b.x, b.y, b.score);

  for (let i = 0; i < 5; i++) {
    setTimeout(function() {
      if (currentBoss) addExplosion(b.x + Math.random()*b.w, b.y + Math.random()*b.h, 'medium');
    }, i * 250);
  }
  addExplosion(b.x + b.w/2, b.y + b.h/2, 'large');
  screenShake = 20;

  // Any boss killed = MISSION COMPLETE
  stopBGM();
  playSound('victory');
  effects.push({ type: 'text', text: 'MISSION COMPLETE!', x: W/2, y: H/2, frame: 0, maxFrame: 180 });
  setTimeout(function() {
    gameState = 'MISSION_COMPLETE';
    currentBoss = null;
    camera.locked = false;
  }, 3000);
  setTimeout(function() { if (currentBoss === b) currentBoss = null; }, 1500);
}

// ===========================
// HUD DRAWING
// ===========================
const BITMAP_DIGITS = [
  [0x0E,0x11,0x13,0x15,0x19,0x11,0x0E],
  [0x04,0x0C,0x04,0x04,0x04,0x04,0x0E],
  [0x0E,0x11,0x01,0x06,0x08,0x10,0x1F],
  [0x0E,0x11,0x01,0x06,0x01,0x11,0x0E],
  [0x02,0x06,0x0A,0x12,0x1F,0x02,0x02],
  [0x1F,0x10,0x1E,0x01,0x01,0x11,0x0E],
  [0x06,0x08,0x10,0x1E,0x11,0x11,0x0E],
  [0x1F,0x01,0x02,0x04,0x08,0x08,0x08],
  [0x0E,0x11,0x11,0x0E,0x11,0x11,0x0E],
  [0x0E,0x11,0x11,0x0F,0x01,0x02,0x0C]
];

function drawBitmapDigit(x, y, digit, color, scale) {
  const s = scale || 1;
  const pattern = BITMAP_DIGITS[digit];
  if (!pattern) return;
  ctx.fillStyle = color;
  for (let row = 0; row < 7; row++) {
    for (let col = 0; col < 5; col++) {
      if (pattern[row] & (1 << (4 - col))) {
        ctx.fillRect(x + col * s, y + row * s, s, s);
      }
    }
  }
}

function drawBitmapNumber(x, y, numStr, color, scale) {
  const s = scale || 2;
  const digitW = 6 * s;
  for (let i = 0; i < numStr.length; i++) {
    const ch = numStr[i];
    if (ch >= '0' && ch <= '9') {
      drawBitmapDigit(x + i * digitW, y, parseInt(ch), color, s);
    }
  }
  return numStr.length * digitW;
}

function drawBitmapText(x, y, text, color, scale) {
  const s = scale || 1;
  ctx.fillStyle = color;
  ctx.font = (8 * s) + 'px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(text, x, y);
}

function drawHUD() {
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';

  const scoreStr = String(score).padStart(7, '0');
  drawBitmapNumber(12, 6, scoreStr, '#FFFFFF', 2);

  const barX = 12, barY = 24, barW = 80, barH = 6;
  ctx.fillStyle = '#222244';
  ctx.fillRect(barX, barY, barW, barH);
  if (player.inTank && tank) {
    const ratio = Math.max(0, tank.hp / 3);
    ctx.fillStyle = '#3366CC';
    ctx.fillRect(barX + 1, barY + 1, (barW - 2) * ratio, barH - 2);
  } else {
    ctx.fillStyle = '#3366CC';
    ctx.fillRect(barX + 1, barY + 1, barW - 2, barH - 2);
  }

  // Lives display with pixel heart icons
  ctx.fillStyle = '#F8F800';
  ctx.font = 'bold 10px monospace';
  ctx.fillText('1UP', 12, 34);
  const heartImg = OBSTACLE_SPRITES.heart;
  for (let i = 0; i < player.lives; i++) {
    const lx = 42 + i * 18;
    const ly = 33;
    if (heartImg && heartImg.complete && heartImg.naturalWidth > 0) {
      ctx.drawImage(heartImg, lx, ly, 16, 16);
    } else {
      ctx.fillStyle = '#FF2222';
      ctx.fillRect(lx+2, ly+4, 12, 8);
      ctx.fillRect(lx, ly+2, 6, 6);
      ctx.fillRect(lx+8, ly+2, 6, 6);
    }
  }

  const panelX = W / 2 - 80;
  const panelY = 4;
  const panelW = 160;
  const panelH = 36;

  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.beginPath();
  const rad = 6;
  ctx.moveTo(panelX + rad, panelY);
  ctx.lineTo(panelX + panelW - rad, panelY);
  ctx.quadraticCurveTo(panelX + panelW, panelY, panelX + panelW, panelY + rad);
  ctx.lineTo(panelX + panelW, panelY + panelH - rad);
  ctx.quadraticCurveTo(panelX + panelW, panelY + panelH, panelX + panelW - rad, panelY + panelH);
  ctx.lineTo(panelX + rad, panelY + panelH);
  ctx.quadraticCurveTo(panelX, panelY + panelH, panelX, panelY + panelH - rad);
  ctx.lineTo(panelX, panelY + rad);
  ctx.quadraticCurveTo(panelX, panelY, panelX + rad, panelY);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#CCCCCC';
  ctx.font = 'bold 9px monospace';
  ctx.fillText('ARMS', panelX + 8, panelY + 4);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 11px monospace';
  const ammoText = player.ammo === Infinity ? '∞' : String(player.ammo);
  ctx.fillText(ammoText, panelX + 8, panelY + 18);

  const timerStr = String(Math.max(0, Math.ceil(missionTimer))).padStart(2, '0');
  drawBitmapNumber(panelX + panelW / 2 - 18, panelY + 6, timerStr, '#F8A020', 3);

  ctx.fillStyle = '#CCCCCC';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('BOMB', panelX + panelW - 8, panelY + 4);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(String(player.grenades), panelX + panelW - 8, panelY + 18);
  ctx.textAlign = 'left';

  // POW count UI removed

  if (currentBoss && gameState === 'BOSS_FIGHT') {
    const bBarW = 320, bBarH = 16;
    const bx = (W - bBarW) / 2, by = H - 30;
    ctx.fillStyle = '#333333';
    ctx.fillRect(bx, by, bBarW, bBarH);
    const hpRatio = Math.max(0, currentBoss.hp / currentBoss.maxHp);
    ctx.fillStyle = '#CC0000';
    ctx.fillRect(bx + 2, by + 2, (bBarW - 4) * hpRatio, bBarH - 4);
    ctx.strokeStyle = '#FFFFFF';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, bBarW, bBarH);
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(currentBoss.name, bx, by - 14);
  }

  if (weaponAnnounceTimer > 0) {
    weaponAnnounceTimer--;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(weaponAnnounce, W / 2, 60);
  }

  if (missionStartTimer > 0) {
    missionStartTimer--;
    drawMissionStartText();
  }
}

function drawMissionStartText() {
  const text = 'MISSION START!';
  const totalFrames = 120;
  const elapsed = totalFrames - missionStartTimer;
  const charDelay = 3;

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const charW = 22;
  const totalW = text.length * charW;
  const startX = W / 2 - totalW / 2;

  for (let i = 0; i < text.length; i++) {
    const charTime = elapsed - i * charDelay;
    if (charTime < 0) continue;

    const ch = text[i];
    let yOff = 0;
    let alpha = 1;
    if (charTime < 8) {
      yOff = -60 + (charTime / 8) * 60;
      alpha = charTime / 8;
    } else if (missionStartTimer < 30) {
      alpha = missionStartTimer / 30;
    }

    const cx = startX + i * charW + charW / 2;
    const cy = H / 2 - 20 + yOff;

    ctx.globalAlpha = alpha;

    ctx.fillStyle = '#1A1A5A';
    ctx.font = 'bold 26px monospace';
    ctx.fillText(ch, cx + 2, cy + 2);

    ctx.fillStyle = '#4488DD';
    ctx.fillText(ch, cx, cy);

    ctx.save();
    ctx.beginPath();
    ctx.rect(0, cy - 15, W, 15);
    ctx.clip();
    ctx.fillStyle = '#88CCFF';
    ctx.fillText(ch, cx, cy);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawPOWCount() {
  const count = player.powRescued;
  for (let i = 0; i < count; i++) {
    const x = 16 + i * 14;
    const y = H - 24;
    ctx.fillStyle = '#D0A030';
    ctx.fillRect(x + 2, y, 4, 4);
    ctx.fillRect(x + 1, y + 4, 6, 5);
    ctx.fillRect(x + 1, y + 9, 2, 3);
    ctx.fillRect(x + 5, y + 9, 2, 3);
  }
}

function drawLifeIcon(x, y) {
  ctx.fillStyle = '#F8E838';
  ctx.fillRect(x, y, 14, 8);
  ctx.fillStyle = '#E8B888';
  ctx.fillRect(x + 2, y + 5, 10, 8);
  ctx.fillStyle = '#F0F0F0';
  ctx.fillRect(x, y + 4, 14, 2);
  ctx.fillStyle = '#000000';
  ctx.fillRect(x + 4, y + 7, 2, 2);
  ctx.fillRect(x + 9, y + 7, 2, 2);
}

function drawGrenadeIcon(x, y) {
  ctx.fillStyle = '#556B2F';
  ctx.fillRect(x, y + 4, 12, 12);
  ctx.fillStyle = '#6B8E23';
  ctx.fillRect(x + 2, y + 4, 8, 4);
  ctx.fillStyle = '#333333';
  ctx.fillRect(x + 4, y, 4, 6);
}

// ===========================
// EFFECTS RENDERING
// ===========================
function updateEffects() {
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].frame++;
    if (effects[i].frame >= effects[i].maxFrame) effects.splice(i, 1);
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = scorePopups.length - 1; i >= 0; i--) {
    scorePopups[i].y -= 0.5;
    scorePopups[i].life--;
    if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
  }

  if (screenShake > 0) {
    screenShakeX = (Math.random() - 0.5) * screenShake;
    screenShakeY = (Math.random() - 0.5) * screenShake;
    screenShake *= 0.9;
    if (screenShake < 0.5) screenShake = 0;
  } else {
    screenShakeX = 0;
    screenShakeY = 0;
  }
}

function drawPixelCircle(x, y, r) {
  if (r <= 0) return;
  const step = 2;
  for (let dy = -r; dy <= r; dy += step) {
    const halfW = Math.sqrt(Math.max(0, r * r - dy * dy));
    if (halfW > 0) {
      ctx.fillRect(x - halfW, y + dy, halfW * 2, step);
    }
  }
}

function drawEffects() {
  for (const fx of effects) {
    if (fx.type === 'explosion') {
      const progress = fx.frame / fx.maxFrame;
      const maxR = fx.size === 'large' ? 80 : fx.size === 'medium' ? 48 : 24;
      const radius = maxR * (1 - progress * 0.3);
      const sx = fx.x - camera.x;

      // v4: Try frame-based explosion sprite first
      if (spritesReady) {
        const explType = fx.size === 'large' ? 'large' : 'small';
        if (drawExplosionSprite(sx, fx.y, fx.frame, explType)) {
          continue;
        }
      }

      // Fallback: canvas explosion
      if (progress < 0.7) {
        ctx.fillStyle = 'rgba(80,80,80,' + (0.4 * progress).toFixed(2) + ')';
        drawPixelCircle(sx, fx.y - progress * 15, radius * 1.3);
      }

      const outerA = Math.max(0, 1 - progress);
      if (outerA > 0) {
        ctx.fillStyle = 'rgba(200,40,0,' + outerA.toFixed(2) + ')';
        drawPixelCircle(sx, fx.y, radius);
      }

      const midA = Math.max(0, 1 - progress);
      if (midA > 0) {
        ctx.fillStyle = 'rgba(248,160,0,' + midA.toFixed(2) + ')';
        drawPixelCircle(sx, fx.y, radius * 0.7);
      }

      const innerA = Math.max(0, 1 - progress * 1.3);
      if (innerA > 0) {
        ctx.fillStyle = 'rgba(248,248,0,' + innerA.toFixed(2) + ')';
        drawPixelCircle(sx, fx.y, radius * 0.4);
      }

      if (progress < 0.3) {
        const coreA = Math.max(0, 1 - progress * 3);
        ctx.fillStyle = 'rgba(255,255,255,' + coreA.toFixed(2) + ')';
        drawPixelCircle(sx, fx.y, radius * 0.2);
      }

      if (progress > 0.4) {
        const smokeA = Math.max(0, 0.5 - (progress - 0.4) * 1.2);
        ctx.fillStyle = 'rgba(60,60,60,' + smokeA.toFixed(2) + ')';
        drawPixelCircle(sx + (progress - 0.4) * 10, fx.y - progress * 25, radius * 0.6);
        drawPixelCircle(sx - (progress - 0.4) * 8, fx.y - progress * 20, radius * 0.4);
      }
    } else if (fx.type === 'muzzle') {
      const sx = fx.x - camera.x;
      const s = (3 - fx.frame) * 4;
      ctx.fillStyle = '#F8F8F8';
      ctx.beginPath(); ctx.arc(sx + fx.facing * 8, fx.y, s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#F8F800';
      ctx.beginPath(); ctx.arc(sx + fx.facing * 6, fx.y, s * 1.5, 0, Math.PI * 2); ctx.fill();
    } else if (fx.type === 'hit') {
      const sx = fx.x - camera.x;
      ctx.fillStyle = '#FFFFFF';
      const s = (4 - fx.frame) * 3;
      ctx.fillRect(sx - s, fx.y - 1, s * 2, 2);
      ctx.fillRect(sx - 1, fx.y - s, 2, s * 2);
    } else if (fx.type === 'deflect') {
      const sx = fx.x - camera.x;
      ctx.fillStyle = '#FFD700';
      const s = fx.frame * 2;
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2 + fx.frame * 0.5;
        ctx.fillRect(sx + Math.cos(a) * s, fx.y + Math.sin(a) * s, 3, 3);
      }
    } else if (fx.type === 'text') {
      const alpha = fx.frame < 30 ? fx.frame / 30 : fx.frame > fx.maxFrame - 30 ? (fx.maxFrame - fx.frame) / 30 : 1;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#FFD700';
      ctx.font = 'bold 32px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(fx.text, fx.x, fx.y);
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 2;
      ctx.strokeText(fx.text, fx.x, fx.y);
      ctx.globalAlpha = 1;
    }
  }

  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life / p.maxLife;
    ctx.fillRect(p.x - camera.x, p.y, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  for (const sp of scorePopups) {
    ctx.fillStyle = '#FFFFFF';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.globalAlpha = sp.life / 40;
    ctx.fillText(String(sp.pts), sp.x - camera.x, sp.y);
    ctx.globalAlpha = 1;
  }
}

// ===========================
// RENDERING - PROJECTILES
// ===========================
function drawBulletSprite(img, sx, by, b, scale, facesRight) {
  if (!img || !img.complete || img.naturalWidth === 0) return false;
  const dw = img.naturalWidth * scale;
  const dh = img.naturalHeight * scale;
  ctx.save();
  ctx.translate(sx, by);
  const moveAngle = Math.atan2(b.vy || 0, b.vx || 0);
  const spriteAngle = facesRight ? 0 : Math.PI;
  ctx.rotate(moveAngle - spriteAngle);
  ctx.drawImage(img, -dw / 2, -dh / 2, dw, dh);
  ctx.restore();
  return true;
}

function drawProjectiles() {
  for (const b of playerBullets) {
    const sx = b.x - camera.x;
    if (sx < -30 || sx > W + 30) continue;

    // Try repo projectile sprites first
    if (spritesReady) {
      let spriteUsed = false;
      if (b.type === 'pistol' || b.type === 'hmg') {
        const img = (b.vy < -2 && b.vx === 0) ? PROJECTILE_SPRITES.bulletUp : PROJECTILE_SPRITES.regAttack;
        spriteUsed = drawBulletSprite(img, sx, b.y, b, 2, false);
      } else if (b.type === 'rocket') {
        spriteUsed = drawBulletSprite(PROJECTILE_SPRITES.attack1, sx, b.y, b, 2, false);
        // Draw exhaust trail behind rocket
        if (spriteUsed) {
          for (let i = 0; i < 3; i++) {
            const tx = sx - b.vx * (i * 2 + 1);
            const ty = b.y - b.vy * (i * 2 + 1);
            const colors = ['#F88000', '#F8C000', '#808080'];
            ctx.fillStyle = colors[i];
            ctx.globalAlpha = 0.6 - i * 0.15;
            const s = 5 - i;
            ctx.fillRect(tx - s / 2, ty - s / 2, s, s);
          }
          ctx.globalAlpha = 1;
        }
      } else if (b.type === 'shotgun') {
        spriteUsed = drawBulletSprite(PROJECTILE_SPRITES.regAttack, sx, b.y, b, 1.5, false);
      }
      if (spriteUsed) continue;
    }

    // Canvas fallback
    if (b.type === 'pistol') {
      ctx.fillStyle = '#F8F800';
      ctx.fillRect(sx - 3, b.y - 2, 6, 4);
      ctx.fillStyle = '#F8F8F8';
      ctx.fillRect(sx - 2, b.y - 1, 4, 2);
      ctx.fillStyle = 'rgba(248,248,0,0.35)';
      const trailLen = Math.abs(b.vx) * 2;
      ctx.fillRect(sx - 3 - (b.vx > 0 ? trailLen : 0), b.y - 1, trailLen, 2);
    } else if (b.type === 'hmg') {
      ctx.fillStyle = '#F8A800';
      ctx.fillRect(sx - 4, b.y - 3, 8, 6);
      ctx.fillStyle = '#F8F800';
      ctx.fillRect(sx - 3, b.y - 2, 6, 4);
      ctx.fillStyle = 'rgba(248,168,0,0.35)';
      const trailLen2 = Math.abs(b.vx) * 3;
      ctx.fillRect(sx - 4 - (b.vx > 0 ? trailLen2 : 0), b.y - 2, trailLen2, 4);
    } else if (b.type === 'rocket') {
      ctx.fillStyle = '#808080';
      ctx.fillRect(sx - 6, b.y - 3, 12, 6);
      ctx.fillStyle = '#E03030';
      const nx = b.vx > 0 ? sx + 4 : sx - 8;
      ctx.fillRect(nx, b.y - 2, 4, 4);
      for (let i = 0; i < 4; i++) {
        const tx = sx - b.vx * (i * 3 + 2) + (((frameCount * 7 + i * 13) % 5) - 2.5) * 1.5;
        const ty = b.y + (((frameCount * 11 + i * 7) % 7) - 3.5) * 1.5;
        const colors = ['#F88000', '#F8C000', '#F8F000', '#808080'];
        ctx.fillStyle = colors[i];
        const s = 6 - i;
        ctx.fillRect(tx - s / 2, ty - s / 2, s, s);
      }
    } else if (b.type === 'shotgun') {
      ctx.fillStyle = '#F8F8F8';
      ctx.fillRect(sx - 2, b.y - 2, 4, 4);
    }
  }

  for (const b of enemyBullets) {
    const sx = b.x - camera.x;
    if (sx < -30 || sx > W + 30) continue;

    // Try enemy bullet sprites — enemy sprites face LEFT by default
    // so enemy bullets going LEFT (vx<0) should NOT flip, going RIGHT should flip
    // This is the SAME logic as player bullets since all repo sprites face left
    if (spritesReady) {
      let spriteUsed = false;
      if (b.type === 'rocket' || b.type === 'boss') {
        spriteUsed = drawBulletSprite(PROJECTILE_SPRITES.attack2, sx, b.y, b, 2, true);
      } else if (b.type === 'bullet') {
        if (ENEMY_SPRITES['scientist'] && ENEMY_SPRITES['scientist'].bullet) {
          spriteUsed = drawBulletSprite(ENEMY_SPRITES['scientist'].bullet, sx, b.y, b, 2, false);
        }
      }
      if (spriteUsed) continue;
    }

    // Canvas fallback
    if (b.type === 'rocket') {
      ctx.fillStyle = '#808080';
      ctx.fillRect(sx - 7, b.y - 3, 14, 6);
      ctx.fillStyle = '#CC3333';
      ctx.fillRect(sx + (b.vx > 0 ? 5 : -7), b.y - 2, 3, 4);
      ctx.fillStyle = 'rgba(248,128,0,0.5)';
      ctx.fillRect(sx - (b.vx > 0 ? 12 : -7), b.y - 2, 5, 4);
    } else if (b.type === 'grenade') {
      // Use Grenade.png for enemy grenades
      if (spritesReady && PROJECTILE_SPRITES.grenade && PROJECTILE_SPRITES.grenade.complete && PROJECTILE_SPRITES.grenade.naturalWidth > 0) {
        const gImg = PROJECTILE_SPRITES.grenade;
        const gScale = 2;
        const gw = gImg.naturalWidth * gScale;
        const gh = gImg.naturalHeight * gScale;
        ctx.save();
        ctx.translate(sx, b.y);
        ctx.rotate(frameCount * 0.2);
        ctx.drawImage(gImg, -gw / 2, -gh / 2, gw, gh);
        ctx.restore();
      } else {
        ctx.fillStyle = '#556B2F';
        ctx.fillRect(sx - 5, b.y - 5, 10, 10);
        ctx.fillStyle = '#333';
        ctx.fillRect(sx - 1, b.y - 7, 2, 3);
      }
    } else {
      ctx.fillStyle = '#F08000';
      ctx.fillRect(sx - 3, b.y - 2, 6, 4);
      ctx.fillStyle = 'rgba(240,128,0,0.3)';
      const tLen = Math.abs(b.vx) * 2;
      ctx.fillRect(sx - 3 - (b.vx > 0 ? tLen : 0), b.y - 1, tLen, 2);
    }
  }

  // Player grenades - use Grenade.png
  for (const g of grenades) {
    const sx = g.x - camera.x;
    if (spritesReady && PROJECTILE_SPRITES.grenade && PROJECTILE_SPRITES.grenade.complete && PROJECTILE_SPRITES.grenade.naturalWidth > 0) {
      const gImg = PROJECTILE_SPRITES.grenade;
      const gScale = 2;
      const gw = gImg.naturalWidth * gScale;
      const gh = gImg.naturalHeight * gScale;
      ctx.save();
      ctx.translate(sx, g.y);
      ctx.rotate(frameCount * 0.2);
      ctx.drawImage(gImg, -gw / 2, -gh / 2, gw, gh);
      ctx.restore();
    } else {
      ctx.fillStyle = '#556B2F';
      const rot = frameCount * 0.2;
      ctx.save();
      ctx.translate(sx, g.y);
      ctx.rotate(rot);
      ctx.fillRect(-6, -6, 12, 12);
      ctx.fillStyle = '#333';
      ctx.fillRect(-1, -9, 2, 4);
      ctx.restore();
    }
  }
}

// ===========================
// GAME INITIALIZATION
// ===========================
function initGame() {
  stopBGM();
  playBGM('bgm');
  resetPlayer(true);
  player.x = 100;
  player.y = GROUND_Y - player.h;
  camera.x = 0;
  camera.maxX = 0;
  camera.locked = false;
  enemies.length = 0;
  playerBullets.length = 0;
  enemyBullets.length = 0;
  grenades.length = 0;
  items.length = 0;
  particles.length = 0;
  effects.length = 0;
  scorePopups.length = 0;
  currentBoss = null;
  bossIntroTimer = 0;
  weaponAnnounce = '';
  weaponAnnounceTimer = 0;
  initLevel();
  initEnemySpawns();
  initPOWs();
  initTank();
  player.invincible = 180;
  if (!window._gameStartedBefore) {
    missionStartTimer = 120;
    window._gameStartedBefore = true;
  } else {
    missionStartTimer = 0;
  }
  missionTimer = 60;
  missionTimerAccum = 0;
  powsRescuedCount = 0;
  gameState = 'PLAYING';
}

// ===========================
// MAIN UPDATE
// ===========================
function update() {
  updateInput();
  frameCount++;

  if (gameState === 'TITLE') {
    if (justPressed['KeyZ'] || justPressed['Enter'] || justPressed['Space'] || anyKeyJustPressed) {
      anyKeyJustPressed = false;
      // Unlock audio on first user interaction
      for (const s of Object.values(SOUNDS)) {
        if (s && s.play) { const p = s.play(); if (p) p.then(function(){ s.pause(); s.currentTime = 0; }).catch(function(){}); }
      }
      initGame();
    }
    return;
  }

  if (gameState === 'GAME_OVER') {
    if (Object.values(justPressed).some(function(v) { return v; }) || anyKeyJustPressed) {
      anyKeyJustPressed = false;
      gameState = 'TITLE';
    }
    return;
  }

  if (gameState === 'MISSION_COMPLETE') {
    if (justPressed['KeyZ'] || anyKeyJustPressed) {
      anyKeyJustPressed = false;
      gameState = 'TITLE';
    }
    return;
  }

  if (gameState === 'PAUSED') {
    if (justPressed['Space']) gameState = 'PLAYING';
    return;
  }

  if (gameState === 'BOSS_INTRO') {
    bossIntroTimer--;
    if (bossIntroTimer <= 0) {
      gameState = 'BOSS_FIGHT';
    }
    updateEffects();
    return;
  }

  if (justPressed['Space']) {
    gameState = 'PAUSED';
    return;
  }

  if (hitStop > 0) { hitStop--; return; }

  missionTimerAccum++;
  if (missionTimerAccum >= 60) {
    missionTimerAccum = 0;
    if (missionTimer > 0) {
      missionTimer--;
      if (missionTimer <= 0) {
        missionTimer = 30;
        killPlayer();
      }
    }
  }

  updatePlayer();
  updateCamera();
  spawnEnemies();
  updateEnemies();
  updateProjectiles();
  updateItems();
  updatePOWs();
  updateTank();
  updateEffects();

  if (gameState === 'BOSS_FIGHT') {
    updateBoss();
  } else {
    checkBossTrigger();
  }

  for (const d of destructibles) {
    if (!d.alive) continue;
    for (let j = playerBullets.length - 1; j >= 0; j--) {
      const b = playerBullets[j];
      if (b.x > d.x && b.x < d.x + d.w && b.y > d.y && b.y < d.y + d.h) {
        d.hp -= b.damage;
        if (d.hp <= 0) destroyDestructible(d);
        playerBullets.splice(j, 1);
        break;
      }
    }
  }

  if (!extraLifeGiven && score >= 100000) {
    extraLifeGiven = true;
    player.lives++;
    effects.push({ type: 'text', text: '1UP!', x: W/2, y: H/2 - 60, frame: 0, maxFrame: 90 });
  }
}

// ===========================
// MAIN RENDER
// ===========================
function render() {
  ctx.clearRect(0, 0, W, H);

  // Show loading screen while sprites are loading (only before first game start)
  if (!spritesReady && gameState === 'TITLE' && spriteLoadCount < spriteTotalCount) {
    drawLoadingScreen();
    // Still draw the title screen once enough is loaded
    if (spriteLoadCount / spriteTotalCount < 0.5) return;
  }

  if (gameState === 'TITLE') { drawTitle(); return; }
  if (gameState === 'GAME_OVER') {
    drawGameplay();
    drawGameOver();
    return;
  }
  if (gameState === 'MISSION_COMPLETE') {
    drawGameplay();
    drawMissionComplete();
    return;
  }

  drawGameplay();

  if (gameState === 'PAUSED') drawPaused();
}

function drawGameplay() {
  ctx.save();
  ctx.translate(screenShakeX, screenShakeY);

  drawBackground(camera.x);

  for (const p of platforms) drawPlatform(p);

  for (const d of destructibles) drawDestructible(d);

  for (const it of items) {
    if (it.life < 180 && Math.floor(it.life / 10) % 2 === 0) continue;
    const bob = it.onGround ? Math.sin(frameCount * 0.1) * 3 : 0;
    drawItem(it.x - camera.x, it.y + bob, it.type);
  }

  for (const p of pows) {
    const sx = p.x - camera.x;
    if (sx < -50 || sx > W + 50) continue;
    if (p.state === 'run' && p.runTimer > 120) continue;
    drawPOW(sx, p.y, p.state, p.animFrame);
  }

  if (tank && tank.hp > 0 && !tank.occupied) {
    drawTank(tank.x - camera.x, tank.y, tank.hp, Math.floor(tank.treadFrame), false);
  }
  if (tank && tank.occupied) {
    drawTank(tank.x - camera.x, tank.y, tank.hp, Math.floor(tank.treadFrame), true);
  }

  for (const e of enemies) {
    const sx = e.x - camera.x;
    if (sx < -60 || sx > W + 60) continue;
    if (e.parachute) {
      const px = sx + e.w/2;
      const py = e.y;

      // PNG parachute sprite (primary)
      const paraImg = OBSTACLE_SPRITES.parachute;
      if (paraImg && paraImg.complete && paraImg.naturalWidth > 0) {
        const paraW = 100;
        const paraH = 100;
        const paraPx = sx + e.w / 2 - paraW / 2;
        const paraPy = e.y - paraH;
        ctx.drawImage(paraImg, paraPx, paraPy, paraW, paraH);
      } else {
        // Canvas fallback: striped parachute dome
        const domeW = 60, domeH = 30;
        const domeY = py - 55;

        for (let row = 0; row < domeH; row++) {
          const ratio = row / domeH;
          const halfW = Math.sqrt(1 - (1 - ratio) * (1 - ratio)) * domeW / 2;
          const stripeW = halfW * 2 / 5;
          for (let s = 0; s < 5; s++) {
            ctx.fillStyle = s % 2 === 0 ? '#F0F0F0' : '#608838';
            const sx2 = px - halfW + s * stripeW;
            ctx.fillRect(sx2, domeY + row, stripeW, 1);
          }
        }

        ctx.fillStyle = '#000000';
        ctx.fillRect(px - domeW/2, domeY + domeH, domeW, 1);

        ctx.strokeStyle = '#404040';
        ctx.lineWidth = 1;
        for (let l = 0; l < 4; l++) {
          const lx = px - domeW/2 + (l + 0.5) * domeW / 4;
          ctx.beginPath();
          ctx.moveTo(lx, domeY + domeH);
          ctx.lineTo(px, py);
          ctx.stroke();
        }
      }
    }
    drawEnemy(sx, e.y, e.type, e.state, e.facing, e.animFrame);
  }

  if (tank && tank.hp <= 0 && tank.occupied) {
    tank.occupied = false;
    player.inTank = false;
  }
  if (!tank && player.inTank) {
    player.inTank = false;
  }

  if (!player.dead || player.deathTimer < 60) {
    if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
      // Blink when invincible
    } else if (!player.inTank) {
      const px = player.x - camera.x;
      drawMarco(px, player.y, player.state, player.facing, player.animFrame);
    }
  }

  if (currentBoss) {
    const bsx = currentBoss.x - camera.x;
    if (currentBoss.type === 'allen') {
      drawAllen(bsx, currentBoss.y, currentBoss.state, currentBoss.facing, currentBoss.animFrame, currentBoss.flashTimer > 0);
    } else {
      drawBossTank(bsx, currentBoss.y, currentBoss.phase, Math.floor(currentBoss.treadFrame), currentBoss.flashTimer > 0);
    }
  }

  drawProjectiles();

  drawEffects();

  ctx.restore();

  drawHUD();
}

// ===========================
// GAME LOOP
// ===========================
let lastTime = 0;
let accumulator = 0;

function gameLoop(timestamp) {
  if (lastTime === 0) { lastTime = timestamp; }
  const delta = Math.min(timestamp - lastTime, 100);
  lastTime = timestamp;
  accumulator += delta;

  while (accumulator >= DT) {
    update();
    accumulator -= DT;
  }

  render();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
