<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Metal Slug Tribute v4</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
</style>
</head>
<body>
<canvas id="gameCanvas" width="640" height="448"></canvas>
<script>
'use strict';
// ===========================
// METAL SLUG TRIBUTE v4
// Frame-based Sprite Animation System
// ===========================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Scale canvas to fit window
function resizeCanvas() {
  const ratio = 640 / 448;
  let w = window.innerWidth, h = window.innerHeight;
  if (w / h > ratio) { canvas.style.height = h + 'px'; canvas.style.width = (h * ratio) + 'px'; }
  else { canvas.style.width = w + 'px'; canvas.style.height = (w / ratio) + 'px'; }
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ===========================
// FRAME-BASED SPRITE LOADING SYSTEM (v4 primary)
// ===========================
const SPRITE_DEFS = {
  // Player sprites (numbered frames: 0.png, 1.png, ...)
  player_idle:        { folder: 'PlayerIdle',         count: 11, speed: 8 },
  player_stand:       { folder: 'PlayerStanding',     count: 11, speed: 6 },
  player_walk:        { folder: 'PlayerWalking',      count: 23, speed: 3 },
  player_shoot:       { folder: 'PlayerShooting',     count: 8,  speed: 4 },
  player_jump:        { folder: 'PlayerJumpUp',       count: 6,  speed: 5 },
  player_knife:       { folder: 'PlayerKnife',        count: 8,  speed: 3 },
  player_crouch_shoot:{ folder: 'PlayerCrouchShoot',  count: 17, speed: 3 },
  player_grenade:     { folder: 'PlayerGrenade',      count: 7,  speed: 4 },
  player_up:          { folder: 'PlayerUp',           count: 8,  speed: 4 },
  player_crouch_gren: { folder: 'PlayerCrouchGrenade',count: 12, speed: 3 },
  player_victory:     { folder: 'PlayerVictory',      count: 7,  speed: 6 },
  player_reload:      { folder: 'PlayerReload',       count: 19, speed: 3 },
  player_direction:   { folder: 'PlayerDirection',    count: 4,  speed: 6 },
  // Effect sprites (numbered frames)
  bullet_explode:     { folder: 'ProjectileBulletExplosion', count: 11, speed: 2 },
  grenade_explode:    { folder: 'ProjectileGrenadeExplosion', count: 20, speed: 2 },
};

// Named enemy sprites (not numbered frames!)
const ENEMY_SPRITES = {};

// Standalone projectile sprites
const PROJECTILE_SPRITES = {};

// Obstacle / environment PNG sprites
const OBSTACLE_SPRITES = {};

const SPRITE_FRAMES = {}; // { anim_name: [Image, Image, ...] }
let spriteLoadCount = 0;
let spriteTotalCount = 0;
let spritesReady = false;

function checkAllLoaded() {
  if (spriteLoadCount >= spriteTotalCount) spritesReady = true;
}

function loadSpriteImage(src) {
  const img = new Image();
  spriteTotalCount++;
  img.onload = () => { spriteLoadCount++; checkAllLoaded(); };
  img.onerror = () => { spriteLoadCount++; checkAllLoaded(); };
  img.src = src;
  return img;
}

function loadAllSprites() {
  // Load numbered player + effect frame sprites
  for (const [name, def] of Object.entries(SPRITE_DEFS)) {
    SPRITE_FRAMES[name] = [];
    for (let i = 0; i < def.count; i++) {
      const img = loadSpriteImage('sprites/' + def.folder + '/' + i + '.png');
      SPRITE_FRAMES[name].push(img);
    }
  }
  // Load standalone sprites (Map1, etc.)
  ['Map1.png','Grenade.png','BulletUp.png','Attack1.png','Attack2.png','RegAttack.png'].forEach(function(f) {
    const img = loadSpriteImage('sprites/' + f);
    SPRITE_FRAMES['standalone_' + f.replace('.png','')] = [img];
  });
}

function loadEnemySprites() {
  const enemies = {
    scientist: {
      alive: 'EnemyScientist/Scientist.png',
      death: 'EnemyScientist/ScientistDeath.png',
      bullet: 'EnemyScientist/ScientistBullet.png'
    },
    tank: {
      alive: 'EnemyTank/EnemyTank.png',
      death: 'EnemyTank/TankDeath.png',
      bullet: 'EnemyTank/TankBullet.png'
    },
    helicopter: {
      alive: 'EnemyHelicopter/EnemyHelicopter.png',
      death: 'EnemyHelicopter/HelicopterDeath.png',
      bullet: 'EnemyHelicopter/HelicopterBullet.png'
    },
    mecha: {
      alive: 'EnemyMechaRobot/EnemyMechaRobot.png',
      death: 'EnemyMechaRobot/MechaRobotDeath.png',
      bullet: 'EnemyMechaRobot/MechaRobotAttack.png'
    },
    airship: {
      alive: 'EnemyAirship/EnemyAirship.png',
      death: 'EnemyAirship/AirshipDeath.png',
      bullet: 'EnemyAirship/AirshipAttack.png'
    },
    ufo: {
      alive: 'EnemyUFO/EnemyUFO.png',
      death: 'EnemyUFO/UFODeath.png',
      bullet: 'EnemyUFO/UFOBullet.png'
    },
    zombie: {
      alive: 'EnemyZombieMacro/Zombie.png',
      death: 'EnemyZombieMacro/ZombieDeath.png',
      bullet: 'EnemyZombieMacro/ZombieAttack.png'
    }
  };

  for (const [name, files] of Object.entries(enemies)) {
    ENEMY_SPRITES[name] = {};
    for (const [state, path] of Object.entries(files)) {
      ENEMY_SPRITES[name][state] = loadSpriteImage('sprites/' + path);
    }
  }
}

function loadProjectileSprites() {
  const projectiles = {
    attack1: 'Attack1.png',
    attack2: 'Attack2.png',
    regAttack: 'RegAttack.png',
    grenade: 'Grenade.png',
    bulletUp: 'BulletUp.png'
  };
  for (const [name, file] of Object.entries(projectiles)) {
    PROJECTILE_SPRITES[name] = loadSpriteImage('sprites/' + file);
  }
}

function loadObstacleSprites() {
  const obs = {
    crate: 'obstacle_crate.png',
    sandbag: 'obstacle_sandbag.png',
    barrel: 'obstacle_barrel.png',
    stone: 'obstacle_stone.png',
    parachute: 'parachute.png',
    item_crate: 'item_crate.png',
    item_shotgun: 'item_shotgun.png',
    heart: 'heart.png',
    npc: 'NPC/sticker_pow.png',
    ground: 'bg_ground_desert.png'
  };
  for (const [name, file] of Object.entries(obs)) {
    const img = new Image();
    spriteTotalCount++;
    img.onload = () => { spriteLoadCount++; checkAllLoaded(); };
    img.onerror = () => { spriteLoadCount++; checkAllLoaded(); };
    img.src = 'sprites/' + file;
    OBSTACLE_SPRITES[name] = img;
  }
}

loadAllSprites();
loadEnemySprites();
loadProjectileSprites();
loadObstacleSprites();

// ===========================
// SOUND SYSTEM
// ===========================
const SOUNDS = {};
const SOUND_FILES = {
  bgm: 'BGM1.wav', shoot: 'Shoot.wav', shoot2: 'Shoot2.wav',
  explosion: 'Explosion.wav', explosion1: 'Explosion1.wav',
  grenade: 'grenade.wav', death: 'Death.wav', reload: 'Reload.wav',
  machinegun: 'Machinegun.wav', victory: 'Victory.wav',
  mission: 'Mission1.wav', boss: 'Boss.wav', hit: 'Gettinghit.wav',
  tank: 'Tank.wav', helicopter: 'Helicopter.wav', scientist: 'Scientist.wav'
};
let bgmPlaying = false;

function loadSounds() {
  for (const [name, file] of Object.entries(SOUND_FILES)) {
    const audio = new Audio('sprites/Sounds/' + file);
    audio.volume = name === 'bgm' || name === 'mission' || name === 'boss' ? 0.4 : 0.3;
    if (name === 'bgm' || name === 'mission' || name === 'boss') audio.loop = true;
    SOUNDS[name] = audio;
  }
}

function playSound(name) {
  const s = SOUNDS[name];
  if (s) {
    if (s.readyState >= 2) {
      const clone = s.cloneNode();
      clone.volume = s.volume;
      clone.play().catch(function(){});
    } else {
      s.play().catch(function(){});
    }
  }
}

function playBGM(name) {
  stopBGM();
  const s = SOUNDS[name];
  if (s) {
    s.currentTime = 0;
    const p = s.play();
    if (p) p.catch(function() {
      // Browser blocked autoplay — retry on next user interaction
      function retryPlay() {
        s.play().catch(function(){});
        document.removeEventListener('keydown', retryPlay);
        document.removeEventListener('click', retryPlay);
      }
      document.addEventListener('keydown', retryPlay, { once: true });
      document.addEventListener('click', retryPlay, { once: true });
    });
    bgmPlaying = true;
  }
}

function stopBGM() {
  ['bgm','mission','boss'].forEach(function(n) {
    if (SOUNDS[n]) { SOUNDS[n].pause(); SOUNDS[n].currentTime = 0; }
  });
  bgmPlaying = false;
}

loadSounds();

// Sprite drawing function
function drawSprite(animName, frameIndex, x, y, w, h, flipH) {
  const frames = SPRITE_FRAMES[animName];
  if (!frames || frames.length === 0) return false;
  const idx = frameIndex % frames.length;
  const img = frames[idx];
  if (!img || !img.complete || img.naturalWidth === 0) return false;

  ctx.save();
  if (flipH) {
    ctx.translate(x + w, y);
    ctx.scale(-1, 1);
    ctx.drawImage(img, 0, 0, w, h);
  } else {
    ctx.drawImage(img, x, y, w, h);
  }
  ctx.restore();
  return true;
}

// Map player states to sprite animations
function getPlayerAnim(state) {
  switch(state) {
    case 'idle': return 'player_idle';
    case 'walk': return 'player_walk';
    case 'shoot': return 'player_shoot';
    case 'jump': case 'fall': return 'player_jump';
    case 'crouch': return 'player_crouch_shoot';
    case 'crouch_shoot': return 'player_crouch_shoot';
    case 'knife': return 'player_knife';
    case 'grenade': return 'player_grenade';
    case 'death': return 'player_idle';
    default: return 'player_idle';
  }
}

// Explosion rendering with frame sprites
function drawExplosionSprite(x, y, frame, type) {
  const animName = type === 'large' ? 'grenade_explode' : 'bullet_explode';
  const def = SPRITE_DEFS[animName];
  if (!def) return false;
  const frameIdx = Math.floor(frame / def.speed);
  if (frameIdx >= def.count) return false;
  const size = type === 'large' ? 96 : 48;
  return drawSprite(animName, frameIdx, x - size/2, y - size/2, size, size, false);
}

// ===========================
// IMAGE LOADING SYSTEM (v3 secondary fallback)
// ===========================
const IMAGES = {};
const IMAGE_CROPS = {};

const IMAGE_LIST = [
  'marco_idle','marco_shoot','marco_jump','marco_crouch',
  'marco_hmg','marco_rocket','marco_shotgun',
  'enemy_infantry','enemy_knife','enemy_death',
  'tank_sv001','boss_allen','boss_dicokka',
  'explosion_medium','items','pow_prisoner',
  'bg_city_layer0','bg_city_layer1','bg_base_layer0','bg_base_layer1','bg_ground_city','bg_ground_base'
];
let imagesLoaded = 0;
let useImages = false;

function autoCropImage(name, img) {
  if (name.startsWith('bg_')) return;
  const tc = document.createElement('canvas');
  tc.width = img.width;
  tc.height = img.height;
  const tctx = tc.getContext('2d');
  tctx.drawImage(img, 0, 0);
  const data = tctx.getImageData(0, 0, tc.width, tc.height).data;
  let minX = tc.width, minY = tc.height, maxX = 0, maxY = 0;
  for (let y = 0; y < tc.height; y++) {
    for (let x = 0; x < tc.width; x++) {
      if (data[(y * tc.width + x) * 4 + 3] > 10) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX >= minX && maxY >= minY) {
    IMAGE_CROPS[name] = { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
  }
}

function hasOpaqueBackground(name, img) {
  const tc = document.createElement('canvas');
  tc.width = img.width;
  tc.height = img.height;
  const tctx = tc.getContext('2d');
  tctx.drawImage(img, 0, 0);
  const data = tctx.getImageData(0, 0, tc.width, tc.height).data;
  const corners = [
    [10, 10], [img.width - 10, 10],
    [10, img.height - 10], [img.width - 10, img.height - 10]
  ];
  let opaqueCorners = 0;
  for (const [cx, cy] of corners) {
    const idx = (cy * img.width + cx) * 4;
    if (data[idx + 3] > 200) opaqueCorners++;
  }
  return opaqueCorners >= 3;
}

function drawCroppedImage(ctx, name, dx, dy, dw, dh, flipH) {
  const img = IMAGES[name];
  const crop = IMAGE_CROPS[name];
  if (!img || !crop) return false;
  ctx.save();
  if (flipH) {
    ctx.translate(dx + dw, dy);
    ctx.scale(-1, 1);
    ctx.drawImage(img, crop.x, crop.y, crop.w, crop.h, 0, 0, dw, dh);
  } else {
    ctx.drawImage(img, crop.x, crop.y, crop.w, crop.h, dx, dy, dw, dh);
  }
  ctx.restore();
  return true;
}

const ITEM_BOUNDS = [];
function detectItemBounds() {
  const img = IMAGES['items'];
  const crop = IMAGE_CROPS['items'];
  if (!img || !crop || ITEM_BOUNDS.length > 0) return;
  const tc = document.createElement('canvas');
  tc.width = img.width; tc.height = img.height;
  const tctx = tc.getContext('2d');
  tctx.drawImage(img, 0, 0);
  const data = tctx.getImageData(crop.x, crop.y, crop.w, crop.h).data;
  const colHasPixel = [];
  for (let x = 0; x < crop.w; x++) {
    let has = false;
    for (let y = 0; y < crop.h; y++) {
      if (data[(y * crop.w + x) * 4 + 3] > 20) { has = true; break; }
    }
    colHasPixel.push(has);
  }
  let inItem = false, startX = 0;
  for (let x = 0; x <= crop.w; x++) {
    if (x < crop.w && colHasPixel[x]) {
      if (!inItem) { inItem = true; startX = x; }
    } else {
      if (inItem) {
        let minY = crop.h, maxY = 0;
        for (let ix = startX; ix < x; ix++) {
          for (let iy = 0; iy < crop.h; iy++) {
            if (data[(iy * crop.w + ix) * 4 + 3] > 20) {
              if (iy < minY) minY = iy;
              if (iy > maxY) maxY = iy;
            }
          }
        }
        ITEM_BOUNDS.push({ x: crop.x + startX, y: crop.y + minY, w: x - startX, h: maxY - minY + 1 });
        inItem = false;
      }
    }
  }
}

function drawItemFromStrip(ctx, itemIndex, dx, dy, dw, dh) {
  const img = IMAGES['items'];
  if (!img || itemIndex >= ITEM_BOUNDS.length) return false;
  const b = ITEM_BOUNDS[itemIndex];
  const aspect = b.w / b.h;
  const drawH = dh;
  const drawW = drawH * aspect;
  const offsetX = (dw - drawW) / 2;
  ctx.drawImage(img, b.x, b.y, b.w, b.h, dx + offsetX, dy, drawW, drawH);
  return true;
}

const IMAGE_SKIP_PNG = {};

function loadImages() {
  IMAGE_LIST.forEach(function(name) {
    const img = new Image();
    img.onload = () => {
      IMAGES[name] = img;
      autoCropImage(name, img);
      if (name === 'boss_dicokka' && hasOpaqueBackground(name, img)) {
        IMAGE_SKIP_PNG[name] = true;
      }
      imagesLoaded++;
      if (imagesLoaded === IMAGE_LIST.length) {
        useImages = true;
        detectItemBounds();
      }
    };
    img.onerror = () => { imagesLoaded++; };
    img.src = 'assets/v3/' + name + '.png';
  });
}
loadImages();

function getMarcoImage(state) {
  if (state === 'shoot' || state === 'crouch_shoot') return 'marco_shoot';
  if (state === 'jump' || state === 'fall') return 'marco_jump';
  if (state === 'crouch') return 'marco_crouch';
  return 'marco_idle';
}

function getMarcoWeaponImage() {
  switch (player.weapon) {
    case 'hmg': return 'marco_hmg';
    case 'rocket': return 'marco_rocket';
    case 'shotgun': return 'marco_shotgun';
    default: return 'marco_idle';
  }
}

function getEnemyImage(type, alive) {
  if (!alive) return 'enemy_death';
  if (type === 'knife') return 'enemy_knife';
  return 'enemy_infantry';
}

// ===========================
// CONSTANTS
// ===========================
const W = 640, H = 448;
const GROUND_Y = 368;
const GRAVITY = 0.5;
const MAX_FALL = 8;
const LEVEL_WIDTH = 8000;
const FPS = 60;
const DT = 1000 / FPS;

// ===========================
// INPUT
// ===========================
const keys = {};
const justPressed = {};
const prevKeys = {};
let anyKeyJustPressed = false;
window.addEventListener('keydown', function(e) { keys[e.code] = true; anyKeyJustPressed = true; e.preventDefault(); });
window.addEventListener('keyup', function(e) { keys[e.code] = false; });

function updateInput() {
  for (const k in keys) {
    justPressed[k] = keys[k] && !prevKeys[k];
    prevKeys[k] = keys[k];
  }
}

// ===========================
// GAME STATE
// ===========================
let gameState = 'TITLE';
let frameCount = 0;
let score = 0;
let screenShake = 0;
let screenShakeX = 0, screenShakeY = 0;
let hitStop = 0;
let weaponAnnounce = '';
let weaponAnnounceTimer = 0;
let missionStartTimer = 0;
let extraLifeGiven = false;
let missionTimer = 60;
let missionTimerAccum = 0;
let powsRescuedCount = 0;

// ===========================
// CAMERA
// ===========================
const camera = { x: 0, maxX: 0, locked: false, lockX: 0 };

function updateCamera() {
  if (camera.locked) { camera.x = camera.lockX; return; }
  const targetX = player.x - W * 0.35;
  const newX = camera.x + (targetX - camera.x) * 0.1;
  if (newX > camera.x) camera.x = newX;
  camera.x = Math.max(0, Math.min(LEVEL_WIDTH - W, camera.x));
  if (camera.x > camera.maxX) camera.maxX = camera.x;
}

// ===========================
// PARTICLES & EFFECTS
// ===========================
const particles = [];
const effects = [];
const scorePopups = [];

function addParticle(x, y, vx, vy, color, life, size) {
  particles.push({ x: x, y: y, vx: vx, vy: vy, color: color, life: life, maxLife: life, size: size || 2 });
}

function addExplosion(x, y, size) {
  playSound(size === 'large' ? 'explosion1' : 'explosion');
  effects.push({ type: 'explosion', x: x, y: y, size: size, frame: 0, maxFrame: size === 'large' ? 20 : size === 'medium' ? 12 : 8 });
  screenShake = size === 'large' ? 12 : size === 'medium' ? 8 : 4;
  const count = size === 'large' ? 30 : size === 'medium' ? 20 : 10;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    const colors = ['#F8F8F8','#F8F800','#F89000','#E06800','#A02000','#686868'];
    addParticle(x, y, Math.cos(angle)*speed, Math.sin(angle)*speed - 2, colors[Math.floor(Math.random()*colors.length)], 15 + Math.random()*20, 2 + Math.random()*3);
  }
}

function addMuzzleFlash(x, y, facing) {
  effects.push({ type: 'muzzle', x: x, y: y, facing: facing, frame: 0, maxFrame: 3 });
}

function addScorePopup(x, y, pts) {
  scorePopups.push({ x: x, y: y, pts: pts, life: 40 });
}

function addDust(x, y) {
  for (let i = 0; i < 5; i++) {
    addParticle(x + (Math.random()-0.5)*20, y, (Math.random()-0.5)*2, -Math.random()*1.5, '#A09070', 15 + Math.random()*10, 3);
  }
}

function addShellCasing(x, y, facing) {
  addParticle(x, y, -facing * (1 + Math.random()), -2 - Math.random()*2, '#D0A820', 30, 2);
}

function addSmoke(x, y) {
  addParticle(x + (Math.random()-0.5)*10, y, (Math.random()-0.5)*0.5, -0.5 - Math.random(), '#808080', 20 + Math.random()*15, 4 + Math.random()*4);
}

// ===========================
// SPRITE DRAWING - MARCO (v4: frame sprites primary, then PNG, then canvas)
// ===========================
function drawMarco(cx, cy, state, facing, frame) {
  // v4 PRIMARY: Frame-based sprite rendering with 2x scaling
  if (spritesReady) {
    let animName = getPlayerAnim(state);

    // Up aiming
    if (keys['ArrowUp'] && state !== 'crouch' && state !== 'crouch_shoot' && state !== 'death') {
      animName = 'player_up';
    }

    const def = SPRITE_DEFS[animName];
    const frameIdx = def ? Math.floor(frame / def.speed) : 0;
    const frames = SPRITE_FRAMES[animName];
    const idx = frames ? frameIdx % frames.length : 0;
    const img = frames ? frames[idx] : null;
    const isCrouch = state === 'crouch' || state === 'crouch_shoot';
    const isDeath = state === 'death';

    if (img && img.complete && img.naturalWidth > 0) {
      // Uniform 2x scale — feetY at bottom of CURRENT hitbox
      const scale = 2;
      const drawW = img.naturalWidth * scale;
      const drawH = img.naturalHeight * scale;
      const feetY = cy + player.h;
      const drawY = feetY - drawH;

      if (isDeath) {
        ctx.save();
        ctx.translate(cx + 28, cy + 40);
        ctx.rotate(0.5 + frame * 0.15);
        ctx.translate(-28, -40);
        if (facing < 0) {
          ctx.translate(drawW, 80 - drawH);
          ctx.scale(-1, 1);
          ctx.drawImage(img, 0, 0, drawW, drawH);
        } else {
          ctx.drawImage(img, 0, 80 - drawH, drawW, drawH);
        }
        ctx.restore();
        return;
      } else {
        ctx.save();
        if (facing < 0) {
          ctx.translate(cx + drawW, drawY);
          ctx.scale(-1, 1);
          ctx.drawImage(img, 0, 0, drawW, drawH);
        } else {
          ctx.drawImage(img, cx, drawY, drawW, drawH);
        }
        ctx.restore();
        return;
      }
    }
  }

  // v3 SECONDARY: PNG image fallback
  if (useImages) {
    const imgName = getMarcoWeaponImage();
    const actualImg = IMAGES[imgName] ? imgName : 'marco_idle';

    if (IMAGES[actualImg] && IMAGE_CROPS[actualImg]) {
      ctx.save();
      const isCrouch = state === 'crouch' || state === 'crouch_shoot';
      const isJump = state === 'jump' || state === 'fall';
      const isDeath = state === 'death';

      let spriteImg = actualImg;
      if (isCrouch && IMAGES['marco_crouch'] && IMAGE_CROPS['marco_crouch']) {
        spriteImg = 'marco_crouch';
      }

      // Same feetY as frame sprites — use current hitbox height
      const drawH = 76;
      const drawW = 66;

      const feetY = cy + player.h;
      let dx = cx + (52 - drawW) / 2;
      let drawY = feetY - drawH;
      let yOff = 0;

      if (state === 'walk') yOff = Math.sin(frame * Math.PI / 2) * 2;
      if (isJump) drawY = feetY - drawH - 4;

      if (isDeath) {
        ctx.translate(cx + 28, cy + 40);
        ctx.rotate(0.5 + frame * 0.15);
        ctx.translate(-28, -40);
        dx = xCenter; drawY = 80 - drawH;
      }

      const aimUp = keys['ArrowUp'] && !isCrouch;
      const aimDiag = aimUp && (keys['ArrowLeft'] || keys['ArrowRight']);

      if (aimUp && !aimDiag && !isDeath) {
        ctx.translate(dx + drawW/2, drawY + yOff + drawH);
        ctx.rotate(-0.25 * facing);
        ctx.translate(-(dx + drawW/2), -(drawY + yOff + drawH));
      }
      if (aimDiag && !isDeath) {
        ctx.translate(dx + drawW/2, drawY + yOff + drawH);
        ctx.rotate(-0.15 * facing);
        ctx.translate(-(dx + drawW/2), -(drawY + yOff + drawH));
      }

      drawCroppedImage(ctx, spriteImg, dx, drawY + yOff, drawW, drawH, facing < 0);

      if ((aimUp || aimDiag) && !isDeath) {
        ctx.fillStyle = '#505050';
        const gunX = dx + (facing > 0 ? drawW - 4 : 4);
        const gunY = drawY + yOff + 20;
        if (aimUp && !aimDiag) {
          ctx.fillRect(gunX - 2, gunY - 20, 4, 20);
        } else {
          ctx.save();
          ctx.translate(gunX, gunY);
          ctx.rotate(facing > 0 ? -0.7 : 0.7);
          ctx.fillRect(0, -2, 18 * facing, 4);
          ctx.restore();
        }
      }
      ctx.restore();
      return;
    }
  }

  // TERTIARY: Canvas fallback (from game_v3.html)
  ctx.save();
  const S = 2;
  let ox = cx, oy = cy;
  if (facing < 0) { ctx.translate(cx + 28*S, cy); ctx.scale(-1,1); ox = 0; oy = 0; }
  else { ctx.translate(cx, cy); ox = 0; oy = 0; }

  const isCrouch = state === 'crouch' || state === 'crouch_shoot';
  const isJump = state === 'jump';
  const isDeath = state === 'death';
  const isShoot = state === 'shoot' || state === 'crouch_shoot';

  const canvasAimUp = keys['ArrowUp'] && !isCrouch && !isDeath;
  const canvasAimDiag = canvasAimUp && (keys['ArrowLeft'] || keys['ArrowRight']);
  if (canvasAimUp && !canvasAimDiag) {
    ctx.translate(14*S, 40*S);
    ctx.rotate(-0.25);
    ctx.translate(-14*S, -40*S);
  } else if (canvasAimDiag) {
    ctx.translate(14*S, 40*S);
    ctx.rotate(-0.15);
    ctx.translate(-14*S, -40*S);
  }

  if (isDeath) {
    ctx.translate(14*S, 20*S);
    ctx.rotate(0.5 + frame * 0.1);
    ctx.translate(-14*S, -20*S);
  }

  const walkOff = (state === 'walk') ? Math.sin(frame * 0.5) * 2 : 0;
  const legSpread = (state === 'walk') ? Math.sin(frame * 0.5) * 4 : 0;

  if (!isCrouch) {
    ctx.fillStyle = '#785030';
    ctx.fillRect(ox+(6-legSpread)*S, oy+34*S, 6*S, 5*S);
    ctx.fillRect(ox+(16+legSpread)*S, oy+34*S, 6*S, 5*S);
    ctx.fillStyle = '#906840';
    ctx.fillRect(ox+(7-legSpread)*S, oy+34*S, 4*S, 2*S);
    ctx.fillRect(ox+(17+legSpread)*S, oy+34*S, 4*S, 2*S);
    ctx.fillStyle = '#402820';
    ctx.fillRect(ox+(5-legSpread)*S, oy+39*S, 8*S, 1*S);
    ctx.fillRect(ox+(15+legSpread)*S, oy+39*S, 8*S, 1*S);

    ctx.fillStyle = '#88A850';
    ctx.fillRect(ox+(7-legSpread)*S, oy+26*S, 5*S, 8*S);
    ctx.fillRect(ox+(16+legSpread)*S, oy+26*S, 5*S, 8*S);
    ctx.fillStyle = '#506828';
    ctx.fillRect(ox+(7-legSpread)*S, oy+26*S, 2*S, 8*S);
    ctx.fillRect(ox+(19+legSpread)*S, oy+26*S, 2*S, 8*S);

    ctx.fillStyle = '#402820';
    ctx.fillRect(ox+6*S, oy+24*S, 16*S, 2*S);
    ctx.fillStyle = '#D0D0D0';
    ctx.fillRect(ox+12*S, oy+24*S, 4*S, 2*S);

    ctx.fillStyle = '#F0F0F0';
    ctx.fillRect(ox+8*S, oy+16*S, 12*S, 8*S);
    ctx.fillStyle = '#E03030';
    ctx.fillRect(ox+6*S, oy+15*S, 4*S, 10*S);
    ctx.fillRect(ox+18*S, oy+15*S, 4*S, 10*S);
    ctx.fillStyle = '#981818';
    ctx.fillRect(ox+6*S, oy+20*S, 4*S, 5*S);
    ctx.fillRect(ox+18*S, oy+20*S, 4*S, 5*S);
    ctx.fillStyle = '#E03030';
    ctx.fillRect(ox+8*S, oy+14*S, 12*S, 2*S);

    ctx.fillStyle = '#E8B888';
    if (isShoot) {
      ctx.fillRect(ox+22*S, oy+16*S, 3*S, 4*S);
      ctx.fillRect(ox+25*S, oy+17*S, 4*S, 3*S);
      ctx.fillStyle = '#404040';
      ctx.fillRect(ox+29*S, oy+17*S, 5*S, 2*S);
      ctx.fillStyle = '#303030';
      ctx.fillRect(ox+29*S, oy+19*S, 3*S, 2*S);
      ctx.fillStyle = '#E8B888';
      ctx.fillRect(ox+3*S, oy+16*S, 3*S, 8*S);
    } else {
      ctx.fillRect(ox+3*S, oy+16*S, 3*S, 8*S);
      ctx.fillRect(ox+22*S, oy+16*S, 3*S, 8*S);
      ctx.fillStyle = '#404040';
      ctx.fillRect(ox+22*S, oy+23*S, 2*S, 4*S);
    }
    ctx.fillStyle = '#F8D8B0';
    ctx.fillRect(ox+4*S, oy+16*S, 2*S, 3*S);
    ctx.fillRect(ox+22*S, oy+16*S, 2*S, 3*S);
    ctx.fillStyle = '#C08050';
    ctx.fillRect(ox+3*S, oy+22*S, 3*S, 2*S);
    ctx.fillStyle = '#000000';
    ctx.fillRect(ox+3*S, oy+23*S, 3*S, 1*S);
    if (!isShoot) ctx.fillRect(ox+22*S, oy+23*S, 3*S, 1*S);

    ctx.fillStyle = '#D0A820';
    ctx.fillRect(ox+7*S, oy+1*S, 14*S, 12*S);
    ctx.fillStyle = '#F8E838';
    ctx.fillRect(ox+8*S, oy+0*S, 12*S, 4*S);
    ctx.fillRect(ox+6*S, oy+2*S, 3*S, 5*S);
    ctx.fillRect(ox+19*S, oy+1*S, 3*S, 3*S);
    ctx.fillStyle = '#986810';
    ctx.fillRect(ox+8*S, oy+6*S, 12*S, 2*S);

    ctx.fillStyle = '#F0F0F0';
    ctx.fillRect(ox+6*S, oy+5*S, 16*S, 2*S);
    ctx.fillStyle = '#B0B0C0';
    ctx.fillRect(ox+6*S, oy+6*S, 16*S, 1*S);
    ctx.fillStyle = '#F0F0F0';
    ctx.fillRect(ox+20*S, oy+5*S, 4*S, 1*S);
    ctx.fillRect(ox+22*S, oy+4*S, 3*S, 1*S);

    ctx.fillStyle = '#E8B888';
    ctx.fillRect(ox+8*S, oy+7*S, 12*S, 6*S);
    ctx.fillStyle = '#F8D8B0';
    ctx.fillRect(ox+9*S, oy+7*S, 8*S, 3*S);
    ctx.fillStyle = '#C08050';
    ctx.fillRect(ox+8*S, oy+12*S, 12*S, 1*S);

    ctx.fillStyle = '#000000';
    ctx.fillRect(ox+11*S, oy+9*S, 2*S, 2*S);
    ctx.fillRect(ox+16*S, oy+9*S, 2*S, 2*S);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(ox+11*S, oy+9*S, 1*S, 1*S);
    ctx.fillRect(ox+16*S, oy+9*S, 1*S, 1*S);

    ctx.fillStyle = '#C08050';
    ctx.fillRect(ox+13*S, oy+11*S, 3*S, 1*S);
  } else {
    ctx.fillStyle = '#785030';
    ctx.fillRect(ox+4*S, oy+20*S, 7*S, 4*S);
    ctx.fillRect(ox+16*S, oy+20*S, 7*S, 4*S);
    ctx.fillStyle = '#402820';
    ctx.fillRect(ox+3*S, oy+23*S, 9*S, 1*S);
    ctx.fillRect(ox+15*S, oy+23*S, 9*S, 1*S);

    ctx.fillStyle = '#88A850';
    ctx.fillRect(ox+6*S, oy+14*S, 16*S, 6*S);
    ctx.fillStyle = '#506828';
    ctx.fillRect(ox+6*S, oy+14*S, 16*S, 2*S);
    ctx.fillStyle = '#402820';
    ctx.fillRect(ox+6*S, oy+12*S, 16*S, 2*S);
    ctx.fillStyle = '#D0D0D0';
    ctx.fillRect(ox+12*S, oy+12*S, 4*S, 2*S);

    ctx.fillStyle = '#F0F0F0';
    ctx.fillRect(ox+8*S, oy+6*S, 12*S, 6*S);

    ctx.fillRect(ox+6*S, oy+5*S, 4*S, 8*S);

    ctx.fillRect(ox+22*S, oy+6*S, 6*S, 3*S);
    ctx.fillStyle = '#404040';
    ctx.fillRect(ox+28*S, oy+6*S, 5*S, 2*S);

    ctx.fillStyle = '#D0A820';
    ctx.fillRect(ox+7*S, oy-6*S, 14*S, 11*S);
    ctx.fillStyle = '#F8E838';
    ctx.fillRect(ox+8*S, oy-7*S, 12*S, 4*S);
    ctx.fillRect(ox+6*S, oy-5*S, 3*S, 5*S);
    ctx.fillStyle = '#986810';
    ctx.fillRect(ox+8*S, oy-1*S, 12*S, 2*S);
    ctx.fillStyle = '#F0F0F0';
    ctx.fillRect(ox+6*S, oy-2*S, 16*S, 2*S);
    ctx.fillStyle = '#E8B888';
    ctx.fillRect(ox+8*S, oy+0*S, 12*S, 5*S);
    ctx.fillStyle = '#000000';
    ctx.fillRect(ox+11*S, oy+2*S, 2*S, 2*S);
    ctx.fillRect(ox+16*S, oy+2*S, 2*S, 2*S);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(ox+11*S, oy+2*S, 1*S, 1*S);
    ctx.fillRect(ox+16*S, oy+2*S, 1*S, 1*S);
  }

  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 1;
  if (!isCrouch) {
    ctx.strokeRect(ox+6*S+0.5, oy+0*S+0.5, 18*S-1, 13*S-1);
    ctx.strokeRect(ox+5*S+0.5, oy+14*S+0.5, 18*S-1, 12*S-1);
  }

  ctx.restore();
}

// ===========================
// SPRITE DRAWING - ENEMY SOLDIER (v4: frame sprites primary)
// ===========================
function drawEnemy(cx, cy, type, state, facing, frame) {
  // v4 PRIMARY: Named enemy sprite rendering
  if (spritesReady) {
    // Map game enemy types to repo sprite types
    let repoType = 'scientist'; // default for infantry, bazooka, parachute
    if (type === 'knife') repoType = 'zombie';
    else if (type === 'shield') repoType = 'tank';
    else if (type === 'parachute') repoType = 'scientist';

    const sprites = ENEMY_SPRITES[repoType];
    if (sprites) {
      const isDead = state === 'death';
      const img = isDead ? sprites.death : sprites.alive;
      if (img && img.complete && img.naturalWidth > 0) {
        // Uniform 2x scale — same as player, feet aligned
        const hitH = type === 'shield' ? 80 : 76;
        const hitW = type === 'shield' ? 52 : 48;
        const escale = 2;
        const dw = img.naturalWidth * escale;
        const dh = img.naturalHeight * escale;
        const feetY = cy + hitH;
        const drawY = feetY - dh;

        // Center sprite on hitbox horizontally
        const offsetX = (hitW - dw) / 2;
        const dx = cx + offsetX;

        if (isDead) {
          ctx.save();
          ctx.translate(dx + dw/2, drawY + dh/2);
          ctx.rotate(-0.3 - frame * 0.15);
          if (facing > 0) { ctx.scale(-1, 1); }
          ctx.drawImage(img, -dw/2, -dh/2, dw, dh);
          ctx.restore();
        } else {
          ctx.save();
          if (facing > 0) {
            ctx.translate(dx + dw, drawY);
            ctx.scale(-1, 1);
            ctx.drawImage(img, 0, 0, dw, dh);
          } else {
            ctx.drawImage(img, dx, drawY, dw, dh);
          }
          ctx.restore();

          // Draw bazooka tube overlay
          if (type === 'bazooka') {
            ctx.fillStyle = '#505050';
            const bx = facing > 0 ? cx + 30 : cx + 2;
            ctx.fillRect(bx, cy + 10, 20, 6);
            ctx.fillStyle = '#383838';
            ctx.fillRect(bx + (facing > 0 ? 18 : 0), cy + 8, 4, 10);
          }
          // Shield overlay removed — tank sprite is enough
        }
        return;
      }
    }
  }

  // TERTIARY: Canvas fallback
  ctx.save();
  const S = 2;
  let ox = 0, oy = 0;
  if (facing < 0) { ctx.translate(cx + 24*S, cy); ctx.scale(-1,1); }
  else { ctx.translate(cx, cy); }

  const isDeath = state === 'death';
  const walkOff = state === 'walk' ? Math.sin(frame * 0.4) * 3 : 0;

  if (isDeath) {
    ctx.translate(12*S, 18*S);
    ctx.rotate(-0.3 - frame * 0.15);
    ctx.translate(-12*S, -18*S);
    oy = -frame * 3;
  }

  ctx.fillStyle = '#503828';
  ctx.fillRect(ox+5*S, oy+32*S, 5*S, 4*S);
  ctx.fillRect(ox+14*S, oy+32*S, 5*S, 4*S);
  ctx.fillStyle = '#382818';
  ctx.fillRect(ox+4*S, oy+35*S, 7*S, 1*S);
  ctx.fillRect(ox+13*S, oy+35*S, 7*S, 1*S);

  ctx.fillStyle = '#A09068';
  ctx.fillRect(ox+6*S, oy+24*S, 4*S, 8*S);
  ctx.fillRect(ox+14*S, oy+24*S, 4*S, 8*S);
  ctx.fillStyle = '#786838';
  ctx.fillRect(ox+6*S, oy+24*S, 2*S, 8*S);
  ctx.fillRect(ox+16*S, oy+24*S, 2*S, 8*S);

  ctx.fillStyle = '#383020';
  ctx.fillRect(ox+5*S, oy+22*S, 14*S, 2*S);

  ctx.fillStyle = '#A09068';
  ctx.fillRect(ox+6*S, oy+14*S, 12*S, 8*S);
  ctx.fillStyle = '#786838';
  ctx.fillRect(ox+6*S, oy+14*S, 3*S, 8*S);
  ctx.fillRect(ox+15*S, oy+14*S, 3*S, 8*S);
  ctx.fillStyle = '#585858';
  ctx.fillRect(ox+7*S, oy+14*S, 10*S, 4*S);
  ctx.fillStyle = '#484848';
  ctx.fillRect(ox+7*S, oy+17*S, 10*S, 1*S);

  ctx.fillStyle = '#D0A070';
  ctx.fillRect(ox+3*S, oy+14*S, 3*S, 7*S);
  ctx.fillRect(ox+18*S, oy+14*S, 3*S, 7*S);
  ctx.fillStyle = '#987048';
  ctx.fillRect(ox+3*S, oy+19*S, 3*S, 2*S);
  ctx.fillRect(ox+18*S, oy+19*S, 3*S, 2*S);

  if (type === 'knife') {
    ctx.fillStyle = '#C0C0C0';
    ctx.fillRect(ox+20*S, oy+14*S, 1*S, 6*S);
    ctx.fillStyle = '#E0E0E0';
    ctx.fillRect(ox+20*S, oy+12*S, 1*S, 3*S);
  } else {
    ctx.fillStyle = '#503828';
    ctx.fillRect(ox+20*S, oy+14*S, 2*S, 3*S);
    ctx.fillStyle = '#404040';
    ctx.fillRect(ox+20*S, oy+12*S, 6*S, 2*S);
  }

  ctx.fillStyle = '#406020';
  ctx.fillRect(ox+5*S, oy+1*S, 14*S, 10*S);
  ctx.fillStyle = '#608838';
  ctx.fillRect(ox+6*S, oy+0*S, 12*S, 4*S);
  ctx.fillStyle = '#284010';
  ctx.fillRect(ox+5*S, oy+8*S, 14*S, 3*S);
  ctx.fillStyle = '#284010';
  ctx.fillRect(ox+4*S, oy+10*S, 16*S, 2*S);

  ctx.fillStyle = '#D0A070';
  ctx.fillRect(ox+7*S, oy+8*S, 10*S, 5*S);
  ctx.fillStyle = '#F0C8A0';
  ctx.fillRect(ox+8*S, oy+8*S, 8*S, 3*S);
  ctx.fillStyle = '#000000';
  ctx.fillRect(ox+9*S, oy+9*S, 2*S, 2*S);
  ctx.fillRect(ox+14*S, oy+9*S, 2*S, 2*S);
  if (isDeath) {
    ctx.fillStyle = '#800000';
    ctx.fillRect(ox+10*S, oy+12*S, 4*S, 2*S);
  } else {
    ctx.fillStyle = '#987048';
    ctx.fillRect(ox+11*S, oy+12*S, 2*S, 1*S);
  }

  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 1;
  ctx.strokeRect(ox+4*S+0.5, oy+0*S+0.5, 16*S-1, 12*S-1);
  ctx.strokeRect(ox+4*S+0.5, oy+13*S+0.5, 16*S-1, 23*S-1);

  ctx.restore();
}

// ===========================
// SPRITE DRAWING - SV-001 TANK
// ===========================
function drawTank(cx, cy, hp, treadFrame, hasPlayer) {
  // v4 PRIMARY: Use EnemyTank sprite (blue-tinted for player tank)
  if (spritesReady && ENEMY_SPRITES['tank']) {
    const img = ENEMY_SPRITES['tank'].alive;
    if (img && img.complete && img.naturalWidth > 0) {
      const scale = 2;
      const dw = img.naturalWidth * scale;
      const dh = img.naturalHeight * scale;
      const tankFeetY = cy + 72;
      const tankDrawY = tankFeetY - dh;
      const dx = cx + (104 - dw) / 2;
      ctx.save();
      // Draw tank sprite (no tint overlay — it covered transparent areas)
      ctx.drawImage(img, dx, tankDrawY, dw, dh);
      // Draw player poking out
      if (hasPlayer) {
        ctx.fillStyle = '#F8E838';
        ctx.fillRect(dx + dw * 0.4, tankDrawY - 8, 16, 8);
        ctx.fillStyle = '#E8B888';
        ctx.fillRect(dx + dw * 0.4 + 2, tankDrawY - 2, 12, 6);
        ctx.fillStyle = '#F0F0F0';
        ctx.fillRect(dx + dw * 0.4, tankDrawY - 2, 16, 2);
      }
      // Damage indicators
      if (hp <= 2) {
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = '#808080';
        ctx.beginPath(); ctx.arc(dx + dw * 0.5, tankDrawY + dh * 0.3, 12, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 1;
      }
      if (hp <= 1) {
        ctx.fillStyle = '#FF4400';
        ctx.beginPath(); ctx.arc(dx + dw * 0.3, tankDrawY + dh * 0.2, 8, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();
      return;
    }
  }

  // v3 SECONDARY: PNG image fallback
  if (useImages && IMAGES['tank_sv001'] && IMAGE_CROPS['tank_sv001']) {
    const tankCrop = IMAGE_CROPS['tank_sv001'];
    const tankAspect = tankCrop.w / tankCrop.h;
    const tankDrawH = 100;
    const tankDrawW = Math.round(tankDrawH * tankAspect);
    const tankFeetY = cy + 72;
    const tankDrawY = tankFeetY - tankDrawH;
    const tankDx = cx + (104 - tankDrawW) / 2;
    drawCroppedImage(ctx, 'tank_sv001', tankDx, tankDrawY, tankDrawW, tankDrawH, false);
    return;
  }
  ctx.save();
  ctx.translate(cx, cy);
  const S = 2;

  ctx.fillStyle = '#383838';
  ctx.fillRect(0, 30*S, 52*S, 6*S);
  ctx.fillStyle = '#686868';
  for (let i = 0; i < 8; i++) {
    const off = (treadFrame + i * 2) % 4;
    ctx.fillRect((2 + i*6 + off)*S, 31*S, 4*S, 4*S);
  }
  ctx.fillStyle = '#505050';
  ctx.fillRect(1*S, 30*S, 50*S, 1*S);
  ctx.fillRect(1*S, 35*S, 50*S, 1*S);

  ctx.fillStyle = '#7088A0';
  ctx.fillRect(4*S, 14*S, 44*S, 16*S);
  ctx.fillStyle = '#A8B8C8';
  ctx.fillRect(6*S, 14*S, 40*S, 6*S);
  ctx.fillStyle = '#405868';
  ctx.fillRect(4*S, 26*S, 44*S, 4*S);
  ctx.fillStyle = '#384838';
  ctx.fillRect(16*S, 16*S, 20*S, 10*S);

  if (hasPlayer) {
    ctx.fillStyle = '#F8E838';
    ctx.fillRect(22*S, 10*S, 8*S, 4*S);
    ctx.fillStyle = '#E8B888';
    ctx.fillRect(23*S, 13*S, 6*S, 3*S);
    ctx.fillStyle = '#F0F0F0';
    ctx.fillRect(22*S, 12*S, 8*S, 1*S);
    ctx.fillStyle = '#E03030';
    ctx.fillRect(22*S, 16*S, 8*S, 3*S);
  }

  ctx.fillStyle = '#7088A0';
  ctx.fillRect(18*S, 6*S, 16*S, 8*S);
  ctx.fillStyle = '#A8B8C8';
  ctx.fillRect(20*S, 6*S, 12*S, 3*S);
  ctx.fillStyle = '#405868';
  ctx.fillRect(18*S, 12*S, 16*S, 2*S);

  ctx.fillStyle = '#909090';
  ctx.fillRect(34*S, 8*S, 14*S, 4*S);
  ctx.fillStyle = '#686868';
  ctx.fillRect(46*S, 7*S, 4*S, 6*S);

  ctx.fillStyle = '#484848';
  ctx.fillRect(48*S, 18*S, 6*S, 2*S);
  ctx.fillRect(48*S, 22*S, 6*S, 2*S);

  ctx.fillStyle = '#D0D8E0';
  ctx.fillRect(8*S, 15*S, 2*S, 1*S);
  ctx.fillRect(10*S, 15*S, 2*S, 1*S);

  if (hp <= 2) {
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#808080';
    ctx.beginPath(); ctx.arc(30*S, 10*S, 6*S, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }
  if (hp <= 1) {
    ctx.fillStyle = '#FF4400';
    ctx.beginPath(); ctx.arc(20*S, 8*S, 4*S, 0, Math.PI*2); ctx.fill();
  }

  ctx.strokeStyle = '#000000';

// Red tint helper — draws sprite then overlays red on opaque pixels only
function drawSpriteRedTint(targetCtx, img, dx, dy, dw, dh, flip) {
  const tc = document.createElement('canvas');
  tc.width = dw; tc.height = dh;
  const t = tc.getContext('2d');
  if (flip) { t.translate(dw, 0); t.scale(-1, 1); }
  t.drawImage(img, 0, 0, dw, dh);
  t.globalCompositeOperation = 'source-atop';
  t.fillStyle = 'rgba(255,0,0,0.5)';
  t.fillRect(0, 0, dw, dh);
  targetCtx.drawImage(tc, dx, dy);
}

// ===========================
function drawItem(cx, cy, type) {
  // S weapon pickup — use dedicated PNG
  if (type === 'S' && OBSTACLE_SPRITES.item_shotgun && OBSTACLE_SPRITES.item_shotgun.complete && OBSTACLE_SPRITES.item_shotgun.naturalWidth > 0) {
    ctx.drawImage(OBSTACLE_SPRITES.item_shotgun, cx, cy, 36, 36);
    return;
  }
  if (useImages && IMAGES['items'] && IMAGE_CROPS['items']) {
    const stripMap = { 'H': 0, 'R': 1, 'G': 2, 'food_can': 3, 'food_apple': 4, 'food_bread': 5 };
    if (type in stripMap) {
      if (drawItemFromStrip(ctx, stripMap[type], cx, cy, 36, 40)) return;
    }
  }

  ctx.save();
  ctx.translate(cx, cy);

  const size = 32;
  ctx.fillStyle = type === 'H' ? '#CC3333' : type === 'R' ? '#33AA33' : type === 'S' ? '#3333CC' :
                  type === 'G' ? '#666633' : type === 'food_can' ? '#AA8844' :
                  type === 'food_apple' ? '#CC3333' : type === 'food_bread' ? '#CC9944' : '#888888';
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = '#00000044';
  ctx.fillRect(0, size*0.6, size, size*0.4);

  ctx.fillStyle = '#FFFFFF44';
  ctx.fillRect(2, 2, size-4, 6);

  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (type === 'H' || type === 'R' || type === 'S') {
    ctx.fillText(type, size/2, size/2);
  } else if (type === 'G') {
    ctx.fillStyle = '#556B2F';
    ctx.fillRect(4, 4, 24, 24);
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 14px monospace';
    ctx.fillText('GRN', size/2, size/2);
  } else if (type === 'food_can') {
    ctx.fillStyle = '#D4AA44';
    ctx.fillRect(6, 6, 20, 20);
    ctx.fillStyle = '#AA7722';
    ctx.fillRect(8, 4, 16, 4);
    ctx.fillRect(8, 24, 16, 4);
  } else if (type === 'food_apple') {
    ctx.fillStyle = '#FF3333';
    ctx.beginPath(); ctx.arc(16, 18, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#33AA33';
    ctx.fillRect(14, 4, 4, 6);
  } else if (type === 'food_bread') {
    ctx.fillStyle = '#DDA844';
    ctx.beginPath();
    ctx.ellipse(16, 18, 12, 8, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#CC9933';
    ctx.beginPath();
    ctx.ellipse(16, 20, 10, 5, 0, 0, Math.PI);
    ctx.fill();
  }

  ctx.strokeStyle = '#000000';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, size, size);

  ctx.restore();
}

// ===========================
// BACKGROUND RENDERING (v4: Map1.png primary, then PNG layers, then canvas)
// ===========================
function drawBackgroundLayer(imgName, parallaxSpeed) {
  const img = IMAGES[imgName];
  if (!img) return false;

  const scale = H / img.height;
  const scaledW = img.width * scale;
  const scrollX = ((camera.x * parallaxSpeed) % scaledW + scaledW) % scaledW;

  ctx.drawImage(img, -scrollX, 0, scaledW, H);
  if (scrollX > 0) {
    ctx.drawImage(img, scaledW - scrollX, 0, scaledW, H);
  }
  return true;
}

function drawGroundLayer(imgName) {
  const img = IMAGES[imgName];
  if (!img) return false;

  const groundH = H - GROUND_Y;
  const scale = groundH / img.height;
  const scaledW = img.width * scale;
  const scrollX = ((camera.x * 1.0) % scaledW + scaledW) % scaledW;

  ctx.drawImage(img, -scrollX, GROUND_Y, scaledW, groundH);
  if (scrollX > 0) {
    ctx.drawImage(img, scaledW - scrollX, GROUND_Y, scaledW, groundH);
  }
  return true;
}

function drawSkyFallback(section) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  if (section === 1) {
    grad.addColorStop(0, '#4A7FB5');
    grad.addColorStop(0.5, '#8BBDE8');
    grad.addColorStop(1, '#F8D8A0');
  } else if (section === 2) {
    grad.addColorStop(0, '#CC6633');
    grad.addColorStop(0.5, '#FFAA55');
    grad.addColorStop(1, '#F8D8A0');
  } else {
    grad.addColorStop(0, '#1A1A3A');
    grad.addColorStop(0.5, '#2A2A5A');
    grad.addColorStop(1, '#3A3A5A');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

function drawCloudsFallback(camX, section) {
  const cloudX = -(camX * 0.2) % 1200;
  ctx.fillStyle = section === 3 ? '#2A2A4A' : '#FFFFFF';
  ctx.globalAlpha = section === 3 ? 0.3 : 0.6;
  const cloudDefs = [
    { offX: 80, offY: 30, w: 50 },
    { offX: 260, offY: 55, w: 80 },
    { offX: 420, offY: 25, w: 40 },
    { offX: 580, offY: 65, w: 70 },
    { offX: 720, offY: 35, w: 90 },
    { offX: 900, offY: 50, w: 55 },
    { offX: 1060, offY: 40, w: 65 },
  ];
  for (const cd of cloudDefs) {
    drawCloud(cloudX + cd.offX, cd.offY, cd.w);
  }
  ctx.globalAlpha = 1;
}

function drawBuildingsFallback(camX, section) {
  const bgX = -(camX * 0.5) % 1600;
  if (section === 1) drawCityBG(bgX);
  else if (section === 2) drawOpenFieldBG(bgX);
  else drawBaseBG(bgX);
}

function drawGroundFallback(camX, section) {
  ctx.fillStyle = section === 3 ? '#555555' : '#5A4A3A';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);

  if (section === 1 || section === 2) {
    for (let row = 0; row < 5; row++) {
      for (let col = -2; col < 40; col++) {
        const cx = (col * 18 + (row % 2) * 9 - camX * 0.1) % (W + 72) - 36;
        const cy = GROUND_Y + 2 + row * 16;
        if (cy > H) continue;
        const shade = ((col + row) % 3 === 0) ? '#6B5B4B' : ((col + row) % 3 === 1) ? '#5A4A3A' : '#4A3A2A';
        ctx.fillStyle = shade;
        ctx.fillRect(cx, cy, 16, 14);
        ctx.fillStyle = '#3A2A1A';
        ctx.fillRect(cx - 1, cy, 1, 14);
        ctx.fillRect(cx, cy - 1, 16, 1);
      }
    }
    ctx.fillStyle = '#7A6A5A';
    ctx.fillRect(0, GROUND_Y, W, 2);
  } else {
    ctx.fillStyle = '#4A4A4A';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    for (let row = 0; row < 4; row++) {
      const py = GROUND_Y + 4 + row * 20;
      ctx.fillStyle = '#3A3A3A';
      ctx.fillRect(0, py, W, 1);
      ctx.fillStyle = '#5A5A5A';
      ctx.fillRect(0, py + 1, W, 1);
    }
    const rivetOff = -(camX * 0.15) % 40;
    ctx.fillStyle = '#606060';
    for (let row = 0; row < 3; row++) {
      for (let col = -1; col < 20; col++) {
        const rx = rivetOff + col * 40 + (row % 2) * 20;
        const ry = GROUND_Y + 8 + row * 20;
        ctx.beginPath();
        ctx.arc(rx, ry, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    ctx.fillStyle = '#666666';
    ctx.fillRect(0, GROUND_Y, W, 2);
  }
  if (section === 1) {
    const groundOff = -(camX) % 80;
    ctx.fillStyle = '#6A8A3A';
    for (let i = -1; i < 12; i++) {
      const gx = groundOff + i * 70 + 10;
      ctx.fillRect(gx, GROUND_Y - 3, 2, 3);
      ctx.fillRect(gx + 4, GROUND_Y - 5, 2, 5);
      ctx.fillRect(gx + 8, GROUND_Y - 2, 2, 2);
      ctx.fillStyle = '#5A7A2A';
      ctx.fillRect(gx + 30, GROUND_Y - 2, 1, 2);
      ctx.fillRect(gx + 33, GROUND_Y - 4, 1, 4);
      ctx.fillStyle = '#6A8A3A';
    }
  }
}

// v4: Map background with Map1.png as primary
function drawBackgroundFallback(camX) {
  const section = camX < 3200 ? 1 : camX < 4400 ? 2 : 3;
  const sectionKey = section === 3 ? 'base' : 'city';

  const hasBg0 = drawBackgroundLayer('bg_' + sectionKey + '_layer0', 0.15);
  if (!hasBg0) {
    drawSkyFallback(section);
  }

  if (!hasBg0) {
    drawCloudsFallback(camX, section);
  }

  const hasBg1 = drawBackgroundLayer('bg_' + sectionKey + '_layer1', 0.4);
  if (!hasBg1) {
    drawBuildingsFallback(camX, section);
  }

  const hasGnd = drawGroundLayer('bg_ground_' + sectionKey);
  if (!hasGnd) {
    drawGroundFallback(camX, section);
  }
}

function drawBackground(camX) {
  // v4 PRIMARY: Use Map1.png as the full level background
  const mapFrames = SPRITE_FRAMES['standalone_Map1'];
  const mapImg = mapFrames && mapFrames[0];
  if (mapImg && mapImg.complete && mapImg.naturalWidth > 0) {
    const scale = H / mapImg.naturalHeight;
    const scaledW = mapImg.naturalWidth * scale;
    // Scroll proportionally to level progress
    const maxScroll = Math.max(0, scaledW - W);
    const maxCam = Math.max(1, LEVEL_WIDTH - W);
    const scrollX = (camera.x / maxCam) * maxScroll;
    ctx.drawImage(mapImg, -scrollX, 0, scaledW, H);
    // Draw desert ground below GROUND_Y matching Map1 sandy style
    const gndImg = OBSTACLE_SPRITES.ground;
    if (gndImg && gndImg.complete && gndImg.naturalWidth > 0) {
      const gH = H - GROUND_Y;
      const gScale = gH / gndImg.naturalHeight;
      const gW = gndImg.naturalWidth * gScale;
      const gScroll = ((camera.x * 1.0) % gW + gW) % gW;
      ctx.drawImage(gndImg, -gScroll, GROUND_Y, gW, gH);
      if (gScroll > 0) ctx.drawImage(gndImg, gW - gScroll, GROUND_Y, gW, gH);
    } else {
      ctx.fillStyle = '#483868';
      ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
      ctx.fillStyle = '#302030';
      for (let gx = -((camera.x * 1.0) % 20); gx < W; gx += 20) {
        ctx.fillRect(gx, GROUND_Y + 2, 18, 2);
      }
    }
    return;
  }

  // Fall back to existing v3 background rendering
  drawBackgroundFallback(camX);

  // Draw ground layer on top (only for fallback, Map1.png has its own ground)
  const section = camX < 3200 ? 1 : camX < 4400 ? 2 : 3;
  const sectionKey = section === 3 ? 'base' : 'city';
  const hasGnd = drawGroundLayer('bg_ground_' + sectionKey);
  if (!hasGnd) {
    drawGroundFallback(camX, section);
  }
}

function drawCloud(x, y, w) {
  ctx.beginPath();
  ctx.ellipse(x, y, w * 0.5, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.ellipse(x - w * 0.25, y + 5, w * 0.3, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.ellipse(x + w * 0.25, y + 3, w * 0.35, 12, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawCityBG(offX) {
  const buildingDefs = [
    { w: 90, hBase: 80, color: '#505058', type: 'dark' },
    { w: 120, hBase: 130, color: '#6A6258', type: 'light' },
    { w: 80, hBase: 60, color: '#606068', type: 'dark' },
    { w: 140, hBase: 160, color: '#484850', type: 'dark' },
    { w: 70, hBase: 90, color: '#7A7068', type: 'light' },
    { w: 110, hBase: 110, color: '#585860', type: 'dark' },
    { w: 100, hBase: 140, color: '#5A5248', type: 'light' },
    { w: 60, hBase: 70, color: '#656568', type: 'dark' },
    { w: 130, hBase: 180, color: '#4A4A52', type: 'dark' },
    { w: 95, hBase: 100, color: '#6E665C', type: 'light' },
    { w: 85, hBase: 120, color: '#535358', type: 'dark' },
    { w: 110, hBase: 85, color: '#626258', type: 'light' },
  ];
  let bx = offX;
  for (let i = 0; i < buildingDefs.length; i++) {
    const bd = buildingDefs[i];
    const h = bd.hBase + ((i * 37) % 40);
    const x = bx;
    bx += bd.w + 10 + (i % 3) * 8;
    if (x + bd.w < -50 || x > W + 50) continue;
    const by = GROUND_Y - h;

    ctx.fillStyle = bd.color;
    ctx.fillRect(x, by, bd.w, h);

    ctx.fillStyle = '#00000020';
    for (let row = 0; row < h; row += 8) {
      ctx.fillRect(x, by + row, bd.w, 1);
      const brickOff = (Math.floor(row / 8) % 2) * 16;
      for (let col = brickOff; col < bd.w; col += 32) {
        ctx.fillRect(x + col, by + row, 1, 8);
      }
    }

    ctx.fillStyle = '#2A2A2A';
    ctx.fillRect(x - 4, by - 2, bd.w + 8, 3);
    ctx.fillStyle = '#3A3A3A';
    ctx.fillRect(x - 2, by, bd.w + 4, 4);

    const winW = 12, winH = 16, winPadX = 24, winPadY = 22;
    for (let wy = by + 14; wy + winH < by + h - 10; wy += winPadY) {
      for (let wx = x + 8; wx + winW < x + bd.w - 8; wx += winPadX) {
        ctx.fillStyle = '#5A5A5A';
        ctx.fillRect(wx - 1, wy - 1, winW + 2, winH + 2);
        ctx.fillStyle = '#1A2A3A';
        ctx.fillRect(wx, wy, winW, winH);
        ctx.fillStyle = '#5A5A5A';
        ctx.fillRect(wx + winW / 2 - 1, wy, 2, winH);
        ctx.fillRect(wx, wy + winH / 2 - 1, winW, 2);
        if ((wx * 7 + wy * 13) % 5 === 0) {
          ctx.fillStyle = '#F8D860';
          ctx.globalAlpha = 0.7;
          ctx.fillRect(wx + 1, wy + 1, winW / 2 - 2, winH / 2 - 2);
          ctx.globalAlpha = 1;
        }
      }
    }

    if (i % 4 === 2) {
      ctx.fillStyle = '#3A3028';
      ctx.fillRect(x + bd.w * 0.3, by + h * 0.6, bd.w * 0.25, h * 0.2);
      ctx.fillStyle = '#8A5A3A';
      ctx.fillRect(x + bd.w * 0.32, by + h * 0.62, 6, 4);
      ctx.fillRect(x + bd.w * 0.38, by + h * 0.66, 6, 4);
    }

    if (i % 5 === 0) {
      ctx.fillStyle = '#3A3A3A';
      ctx.fillRect(x + bd.w * 0.7, by - 18, 10, 18);
      ctx.fillStyle = '#4A4A4A';
      ctx.fillRect(x + bd.w * 0.7 - 2, by - 18, 14, 3);
    }

    if (i % 3 === 0) {
      ctx.fillStyle = '#505050';
      ctx.fillRect(x + bd.w / 2 - 1, by - 20, 2, 20);
      ctx.fillRect(x + bd.w / 2 - 6, by - 20, 12, 2);
    }

    ctx.fillStyle = '#00000022';
    ctx.fillRect(x + bd.w - 10, by, 10, h);

    if (i % 3 === 1 && h > 100) {
      ctx.fillStyle = '#8A3030';
      ctx.fillRect(x + 10, by + h - 26, bd.w * 0.4, 4);
      ctx.fillStyle = '#6A2020';
      const awX = x + 10;
      const awW = bd.w * 0.4;
      ctx.beginPath();
      ctx.moveTo(awX, by + h - 22);
      ctx.lineTo(awX + awW, by + h - 22);
      ctx.lineTo(awX + awW - 4, by + h - 14);
      ctx.lineTo(awX + 4, by + h - 14);
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.fillStyle = '#707070';
  ctx.fillRect(offX + 800, GROUND_Y - 200, 6, 200);
  ctx.fillRect(offX + 760, GROUND_Y - 200, 80, 4);
  ctx.fillRect(offX + 830, GROUND_Y - 196, 2, 60);
  ctx.fillStyle = '#606060';
  ctx.fillRect(offX + 500, GROUND_Y - 220, 40, 10);
  ctx.fillRect(offX + 510, GROUND_Y - 210, 4, 40);
  ctx.fillRect(offX + 526, GROUND_Y - 210, 4, 40);
}

function drawOpenFieldBG(offX) {
  ctx.fillStyle = '#605040';
  ctx.fillRect(offX + 100, GROUND_Y - 40, 400, 40);
  ctx.fillStyle = '#504030';
  ctx.fillRect(offX + 100, GROUND_Y - 40, 400, 4);

  ctx.fillRect(offX + 700, GROUND_Y - 30, 200, 30);

  ctx.fillRect(offX + 700, GROUND_Y - 30, 200, 3);

  }

function drawBaseBG(offX) {
  const colors = ['#404040', '#383838', '#454545', '#3C3C3C'];
  for (let i = 0; i < 10; i++) {
    const x = offX + i * 160;
    const h = 100 + (i * 47 % 120);
    if (x + 120 < -50 || x > W + 50) continue;
    const by = GROUND_Y - h;
    ctx.fillStyle = colors[i % 4];
    ctx.fillRect(x, by, 120, h);
    ctx.fillStyle = '#333333';
    ctx.fillRect(x, by, 120, 6);
    ctx.fillStyle = '#4A4A4A';
    ctx.fillRect(x + 10, by + 20, 40, 30);
    ctx.fillRect(x + 60, by + 20, 40, 30);
    ctx.strokeStyle = '#353535';
    ctx.lineWidth = 1;
    ctx.strokeRect(x + 10, by + 20, 40, 30);
    ctx.strokeRect(x + 60, by + 20, 40, 30);
    ctx.fillStyle = '#5A5A5A';
    for (let r = 0; r < 3; r++) {
      const rx = x + 5 + r * 45;
      const ry = by + 8;
      ctx.beginPath();
      ctx.arc(rx + 2, ry + 2, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.fillStyle = '#353535';
    for (let pl = 0; pl < h; pl += 20) {
      ctx.fillRect(x, by + pl, 120, 1);
    }
    if (i % 3 === 0) {
      ctx.fillStyle = '#C0A020';
      ctx.fillRect(x + 10, by + h - 16, 100, 2);
      ctx.fillStyle = '#202020';
      for (let s = 0; s < 10; s++) {
        ctx.fillRect(x + 10 + s * 10, by + h - 20, 5, 6);
      }
    }
  }
  const sweepPhase = (frameCount % 240) / 240;
  const sweepX = offX + 200 + sweepPhase * 400;
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(offX + 400, GROUND_Y - 200);
  ctx.lineTo(sweepX - 60, GROUND_Y);
  ctx.lineTo(sweepX + 60, GROUND_Y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawPlatform(p) {
  const sx = p.x - camera.x;
  if (sx + p.w < -50 || sx > W + 50) return;

  // PNG sprite rendering (primary)
  if (p.type === 'container' || p.type === 'container_stack') {
    const img = OBSTACLE_SPRITES.crate;
    if (img && img.complete && img.naturalWidth > 0) {
      if (p.type === 'container_stack') {
        ctx.drawImage(img, sx, p.y, p.w, p.h / 2);
        ctx.drawImage(img, sx, p.y + p.h / 2, p.w, p.h / 2);
      } else {
        ctx.drawImage(img, sx, p.y, p.w, p.h);
      }
      return;
    }
  } else if (p.type === 'barricade' || p.type === 'barrier') {
    const img = OBSTACLE_SPRITES.sandbag;
    if (img && img.complete && img.naturalWidth > 0) {
      // Draw much bigger than collider — tall on top
      ctx.drawImage(img, sx - 12, p.y - 40, p.w + 24, p.h + 40);
      return;
    }
  } else if (p.type === 'platform') {
    const img = OBSTACLE_SPRITES.stone;
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, sx, p.y, p.w, p.h);
      return;
    }
  } else if (p.type === 'pillar') {
    const img = OBSTACLE_SPRITES.stone;
    if (img && img.complete && img.naturalWidth > 0) {
      ctx.drawImage(img, sx, p.y, p.w, p.h);
      return;
    }
  }

  // Canvas fallback: Draw obstacles in Map1 Arabian/Middle-Eastern style
  if (p.type === 'container') {
    // Sandstone crate style to match Map1 desert town
    ctx.fillStyle = '#B89860';
    ctx.fillRect(sx, p.y, p.w, p.h);
    // Brick texture
    for (let row = 0; row < p.h; row += 10) {
      const off = (Math.floor(row / 10) % 2) * 15;
      ctx.fillStyle = '#A08848';
      ctx.fillRect(sx, p.y + row, p.w, 1);
      for (let col = off; col < p.w; col += 30) {
        ctx.fillRect(sx + col, p.y + row, 1, 10);
      }
    }
    // Top/bottom stone edge
    ctx.fillStyle = '#C8A870';
    ctx.fillRect(sx, p.y, p.w, 5);
    ctx.fillStyle = '#8A7038';
    ctx.fillRect(sx, p.y + p.h - 5, p.w, 5);
    // Shadow
    ctx.fillStyle = '#00000030';
    ctx.fillRect(sx + p.w - 6, p.y + 3, 6, p.h - 3);
    ctx.fillRect(sx, p.y + p.h - 3, p.w, 3);
    // Outline
    ctx.strokeStyle = '#5A4020';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx + 0.5, p.y + 0.5, p.w - 1, p.h - 1);
  } else if (p.type === 'container_stack') {
    // Stacked sandstone blocks
    for (let i = 0; i < 2; i++) {
      const by = p.y + i * 80;
      ctx.fillStyle = i === 0 ? '#C4A068' : '#A88850';
      ctx.fillRect(sx, by, p.w, 80);
      for (let row = 0; row < 80; row += 10) {
        const off = (Math.floor(row / 10) % 2) * 15;
        ctx.fillStyle = '#9A7838';
        ctx.fillRect(sx, by + row, p.w, 1);
        for (let col = off; col < p.w; col += 30) ctx.fillRect(sx + col, by + row, 1, 10);
      }
      ctx.fillStyle = '#00000025';
      ctx.fillRect(sx + p.w - 6, by + 2, 6, 78);
      ctx.strokeStyle = '#5A4020';
      ctx.strokeRect(sx + 0.5, by + 0.5, p.w - 1, 79);
    }
  } else if (p.type === 'barricade' || p.type === 'barrier') {
    // Sandbag wall (matches desert/Arabian theme)
    ctx.fillStyle = '#B8A070';
    ctx.fillRect(sx, p.y, p.w, p.h);
    for (let r = 0; r < Math.floor(p.h / 12); r++) {
      for (let c = 0; c < Math.floor(p.w / 22); c++) {
        const off = (r % 2) * 11;
        ctx.fillStyle = (r + c) % 2 === 0 ? '#C8B080' : '#A89060';
        ctx.fillRect(sx + c * 22 + off, p.y + r * 12, 20, 10);
        ctx.fillStyle = '#00000018';
        ctx.fillRect(sx + c * 22 + off, p.y + r * 12 + 8, 20, 2);
      }
    }
    ctx.fillStyle = '#00000020';
    ctx.fillRect(sx, p.y + p.h - 4, p.w, 4);
    ctx.strokeStyle = '#7A6030';
    ctx.strokeRect(sx + 0.5, p.y + 0.5, p.w - 1, p.h - 1);
  } else if (p.type === 'platform') {
    // Wooden platform (matches Arabian buildings)
    ctx.fillStyle = '#8A6838';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = '#A07840';
    ctx.fillRect(sx, p.y, p.w, 4);
    // Wood grain lines
    for (let i = 0; i < p.w; i += 16) {
      ctx.fillStyle = '#705028';
      ctx.fillRect(sx + i, p.y + 4, 1, p.h - 4);
    }
    ctx.fillStyle = '#00000020';
    ctx.fillRect(sx, p.y + p.h - 3, p.w, 3);
  } else if (p.type === 'pillar') {
    // Stone pillar
    ctx.fillStyle = '#B09860';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = '#C8B078';
    ctx.fillRect(sx + 2, p.y, p.w - 4, 8);
    ctx.fillRect(sx + 2, p.y + p.h - 8, p.w - 4, 8);
    ctx.fillStyle = '#987840';
    ctx.fillRect(sx + 8, p.y + 12, p.w - 16, p.h - 24);
    ctx.strokeStyle = '#6A5028';
    ctx.strokeRect(sx + 0.5, p.y + 0.5, p.w - 1, p.h - 1);
  }
}

function drawDestructible(d) {
  if (!d.alive) return;
  const sx = d.x - camera.x;

  // PNG sprite rendering (primary)
  const barrelImg = OBSTACLE_SPRITES.barrel;
  if (barrelImg && barrelImg.complete && barrelImg.naturalWidth > 0) {
    ctx.drawImage(barrelImg, sx, d.y, d.w, d.h);
    return;
  }

  // Canvas fallback: Wooden crate matching Arabian/desert theme
  ctx.fillStyle = '#9A7040';
  ctx.fillRect(sx, d.y, d.w, d.h);
  // Wood plank lines
  ctx.fillStyle = '#805828';
  for (let i = 0; i < d.h; i += 8) ctx.fillRect(sx + 2, d.y + i, d.w - 4, 1);
  // Cross brace
  ctx.fillStyle = '#705020';
  ctx.fillRect(sx + 2, d.y + 2, d.w - 4, 3);
  ctx.fillRect(sx + 2, d.y + d.h - 5, d.w - 4, 3);
  ctx.fillRect(sx + d.w/2 - 1, d.y + 2, 3, d.h - 4);
  // Metal corners
  ctx.fillStyle = '#888070';
  ctx.fillRect(sx, d.y, 5, 5);
  ctx.fillRect(sx + d.w - 5, d.y, 5, 5);
  ctx.fillRect(sx, d.y + d.h - 5, 5, 5);
  ctx.fillRect(sx + d.w - 5, d.y + d.h - 5, 5, 5);
  ctx.strokeStyle = '#5A3818';
  ctx.strokeRect(sx + 0.5, d.y + 0.5, d.w - 1, d.h - 1);
}
